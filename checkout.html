<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Checkout | Detoxy Hijama</title>
  <link rel="stylesheet" href="assets/style.css"/>
  <style>
    .checkout-grid{display:grid;grid-template-columns:1fr 360px;gap:32px;align-items:start}
    .checkout-card{background:#fff;border:1px solid var(--border);border-radius:var(--radius);padding:28px;margin-bottom:20px}
    .checkout-card h3{font-family:'Cormorant Garamond',serif;font-size:1.25rem;font-weight:700;color:var(--dark);margin-bottom:20px;padding-bottom:14px;border-bottom:1px solid var(--border)}
    .form-row{display:grid;grid-template-columns:1fr 1fr;gap:14px}
    .pay-option{display:flex;align-items:center;gap:12px;padding:14px;border:1.5px solid var(--border);border-radius:12px;cursor:pointer;transition:all .2s;margin-bottom:10px}
    .pay-option.selected{border-color:var(--t);background:var(--tp)}
    .pay-option input{accent-color:var(--t)}
    .pay-label{font-weight:600;font-size:.9rem;color:var(--dark)}
    .pay-sub{font-size:.75rem;color:var(--muted)}
    .order-item{display:flex;gap:12px;align-items:center;padding:10px 0;border-bottom:1px solid var(--border)}
    .order-item:last-child{border-bottom:none}
    .order-thumb{width:48px;height:48px;object-fit:contain;border-radius:8px;background:var(--cream);border:1px solid var(--border);padding:3px;flex-shrink:0}
    @media(max-width:900px){.checkout-grid{grid-template-columns:1fr}.form-row{grid-template-columns:1fr}}
  </style>
</head>
<body>
<div class="page-wrapper">
  <div id="header-mount"></div>
  <section class="sec">
    <div class="sec-inner">
      <nav class="breadcrumb"><a href="index.html">Home</a><span class="breadcrumb-sep">›</span><a href="cart.html">Cart</a><span class="breadcrumb-sep">›</span><span>Checkout</span></nav>
      <div id="checkoutContent"></div>
    </div>
  </section>
  <div id="footer-mount"></div>
</div>
<script src="config.js"></script>
<script src="shared.js"></script>
<script>
  document.getElementById('header-mount').innerHTML = getNavHTML('');
  document.getElementById('footer-mount').innerHTML = getFooterHTML();

  const prods = (window.DETOXY_CONFIG || {}).products || [];

  // Fix image paths for root-level pages (config images use '../assets/...' for products/ subfolder)
  function fixImg(path) {
    if (!path) return '';
    return path.startsWith('../') ? path.replace('../', '') : path;
  }

  // Store order items for placeOrder — avoids passing large JSON through HTML onclick attribute
  let _orderItems = [];
  let _orderTotal = 0;

  function renderCheckout() {
    const items = Cart.get();
    const el = document.getElementById('checkoutContent');
    if (!items.length) {
      el.innerHTML = `<div class="empty-state"><div class="empty-icon">🛒</div><div class="empty-title">Your cart is empty</div><a href="products.html" class="btn btn--primary">Browse Products</a></div>`;
      return;
    }
    let subtotal = 0;
    const orderItems = items.map(item => {
      const p = prods.find(x => x.id === item.id);
      if (!p) return null;
      subtotal += p.price * item.qty;
      return { ...p, qty: item.qty, lineTotal: p.price * item.qty };
    }).filter(Boolean);
    const shipping = subtotal >= 999 ? 0 : 60;
    const total = subtotal + shipping;
    // Store in closure so placeOrder() can access without HTML attribute JSON
    _orderItems = orderItems;
    _orderTotal = total;
    const itemsHTML = orderItems.map(i => `
      <div class="order-item">
        <img class="order-thumb" src="${fixImg(i.images && i.images[0])}" alt="${i.name}" onerror="this.src='https://placehold.co/48x48/1a3d35/2dd4bf?text=P'">
        <div style="flex:1"><div style="font-weight:600;font-size:.85rem;color:var(--dark)">${i.name}</div><div style="font-size:.75rem;color:var(--muted)">₹${i.price} × ${i.qty}</div></div>
        <div style="font-weight:700;color:var(--td);font-size:.9rem">₹${i.lineTotal}</div>
      </div>`).join('');
    el.innerHTML = `
    <h1 class="sec-h2" style="margin-bottom:28px">Checkout</h1>
    <div class="checkout-grid">
      <div>
        <div class="checkout-card">
          <h3>Shipping Details</h3>
          <div id="orderAlert"></div>
          <div class="form-row">
            <div class="form-group"><label class="form-label">First Name <span class="req">*</span></label><input class="form-input" id="cFirst" placeholder="First name"/></div>
            <div class="form-group"><label class="form-label">Last Name <span class="req">*</span></label><input class="form-input" id="cLast" placeholder="Last name"/></div>
          </div>
          <div class="form-group"><label class="form-label">Phone <span class="req">*</span></label><input class="form-input" id="cPhone" type="tel" placeholder="+91 xxxxx xxxxx"/></div>
          <div class="form-group"><label class="form-label">Email</label><input class="form-input" id="cEmail" type="email" placeholder="your@email.com"/></div>
          <div class="form-group"><label class="form-label">Address <span class="req">*</span></label><input class="form-input" id="cAddr" placeholder="Street, area"/></div>
          <div class="form-row">
            <div class="form-group"><label class="form-label">City <span class="req">*</span></label><input class="form-input" id="cCity" placeholder="City"/></div>
            <div class="form-group"><label class="form-label">State</label><input class="form-input" id="cState" placeholder="State"/></div>
          </div>
          <div class="form-row">
            <div class="form-group"><label class="form-label">PIN Code <span class="req">*</span></label><input class="form-input" id="cPin" placeholder="6-digit PIN"/></div>
            <div class="form-group"><label class="form-label">Country</label><input class="form-input" id="cCountry" value="India"/></div>
          </div>
          <div class="form-group"><label class="form-label">Order Notes</label><textarea class="form-textarea" id="cNotes" rows="2" placeholder="Any special instructions?"></textarea></div>
        </div>
        <div class="checkout-card">
          <h3>Payment Method</h3>
          <label class="pay-option" onclick="selectPay(this)"><input type="radio" name="pay" value="UPI" checked><div><div class="pay-label">📱 UPI / QR Payment</div><div class="pay-sub">PhonePe, GPay, Paytm — instant</div></div></label>
          <label class="pay-option" onclick="selectPay(this)"><input type="radio" name="pay" value="Card"><div><div class="pay-label">💳 Debit / Credit Card</div><div class="pay-sub">All major cards accepted</div></div></label>
          <label class="pay-option" onclick="selectPay(this)"><input type="radio" name="pay" value="COD"><div><div class="pay-label">💵 Cash on Delivery</div><div class="pay-sub">Pay when order arrives</div></div></label>
          <label class="pay-option" onclick="selectPay(this)"><input type="radio" name="pay" value="Bank Transfer"><div><div class="pay-label">🏦 Bank Transfer / NEFT</div><div class="pay-sub">For large orders — contact us</div></div></label>
        </div>
      </div>
      <div>
        <div class="summary-card" style="position:sticky;top:80px;background:#fff;border:1px solid var(--border);border-radius:var(--radius);padding:24px">
          <h3 style="font-family:'Cormorant Garamond',serif;font-size:1.2rem;font-weight:700;color:var(--dark);margin-bottom:16px;padding-bottom:12px;border-bottom:1px solid var(--border)">Order Summary</h3>
          ${itemsHTML}
          <div style="margin-top:14px;padding-top:14px;border-top:1px solid var(--border)">
            <div style="display:flex;justify-content:space-between;font-size:.87rem;margin-bottom:8px"><span style="color:var(--muted)">Subtotal</span><span>₹${subtotal}</span></div>
            <div style="display:flex;justify-content:space-between;font-size:.87rem;margin-bottom:12px"><span style="color:var(--muted)">Shipping</span><span>${shipping === 0 ? '<span style="color:var(--t)">FREE</span>' : '₹' + shipping}</span></div>
            <div style="display:flex;justify-content:space-between;font-weight:700;font-size:1.05rem;color:var(--dark)"><span>Total</span><span style="color:var(--td)">₹${total}</span></div>
          </div>
          <button class="btn btn--primary btn--full" style="margin-top:18px" id="placeOrderBtn" onclick="placeOrder()">
            Place Order →
          </button>
          <div style="text-align:center;margin-top:12px"><span class="trust-pill">🔒 Secure Checkout</span></div>
        </div>
      </div>
    </div>`;
    // init first pay option selected
    document.querySelectorAll('.pay-option')[0].classList.add('selected');
  }

  function selectPay(label) {
    document.querySelectorAll('.pay-option').forEach(l => l.classList.remove('selected'));
    label.classList.add('selected');
  }

  async function placeOrder() {
    const total = _orderTotal;
    const items = _orderItems;
    const get = id => document.getElementById(id)?.value?.trim() || '';
    const first = get('cFirst'), last = get('cLast'), phone = get('cPhone'), addr = get('cAddr'), city = get('cCity'), pin = get('cPin');
    const alertEl = document.getElementById('orderAlert');
    if (!first || !last || !phone || !addr || !city || !pin) {
      alertEl.innerHTML = '<div class="alert alert--error">Please fill all required fields.</div>';
      return;
    }
    const btn = document.getElementById('placeOrderBtn');
    btn.disabled = true; btn.textContent = 'Placing order...';
    const payMethod = document.querySelector('input[name="pay"]:checked')?.value || 'COD';
    const orderData = {
      id: 'ORD-' + Date.now(),
      timestamp: new Date().toISOString(),
      name: first + ' ' + last,
      phone, email: get('cEmail'),
      address: addr + ', ' + city + ', ' + get('cState') + ' - ' + pin + ', ' + (get('cCountry') || 'India'),
      items: items.map(i => `${i.name} x${i.qty} (₹${i.lineTotal})`).join(' | '),
      subtotal: total,
      payment: payMethod,
      notes: get('cNotes'),
      status: 'New'
    };
    try {
      const result = await OrderSync.submit(orderData);
      Cart.clear();
      window.location.href = 'confirmation.html?id=' + encodeURIComponent(orderData.id || Date.now());
    } catch (err) {
      alertEl.innerHTML = '<div class="alert alert--error">Something went wrong. Please try again.</div>';
      btn.disabled = false;
      btn.textContent = 'Place Order';
    }
  }

  renderCheckout();
</script>
</body>
</html>
