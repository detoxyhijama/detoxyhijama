<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>My Account | Detoxy Hijama</title>
  <meta name="description" content="Login or create your Detoxy Hijama account to track orders and manage your profile."/>
  <meta name="keywords" content="detoxy hijama login, my account hijama"/>
  <link rel="canonical" href="https://detoxyhijama.github.io/login.html"/>
  <meta name="robots" content="noindex, nofollow"/>
  <meta property="og:type" content="website"/>
  <meta property="og:url" content="https://detoxyhijama.github.io/login.html"/>
  <meta property="og:title" content="My Account | Detoxy Hijama"/>
  <meta property="og:description" content="Login or create your Detoxy Hijama account to track orders and manage your profile."/>
  <meta property="og:image" content="https://detoxyhijama.github.io/assets/logo.png"/>
  <meta property="og:site_name" content="Detoxy Hijama"/>
  <meta name="twitter:card" content="summary_large_image"/>
  <meta name="twitter:title" content="My Account | Detoxy Hijama"/>
  <meta name="twitter:description" content="Login or create your Detoxy Hijama account to track orders and manage your profile."/>
  <meta name="twitter:image" content="https://detoxyhijama.github.io/assets/logo.png"/>
  <link rel="stylesheet" href="assets/style.css"/>
  <style>
    body{background:var(--cream);min-height:100vh;display:flex;flex-direction:column}
    .login-wrapper{flex:1;display:flex;align-items:center;justify-content:center;padding:48px 20px}
    .login-card{background:#fff;border-radius:24px;padding:44px 36px;width:100%;max-width:420px;border:1px solid var(--border);box-shadow:0 8px 40px rgba(26,61,53,.08)}
    .login-logo{display:flex;align-items:center;justify-content:center;gap:12px;margin-bottom:28px}
    .login-logo img{width:48px;height:48px;border-radius:50%;object-fit:cover}
    .login-logo-svg{width:48px;height:48px;border-radius:50%;display:block}
    .login-logo-name{font-family:'Cormorant Garamond',serif;font-size:1.4rem;font-weight:700;color:var(--dark)}
    .login-tabs{display:flex;border-bottom:2px solid var(--border);margin-bottom:28px}
    .login-tab{flex:1;padding:12px;text-align:center;font-size:.85rem;font-weight:600;color:var(--muted);cursor:pointer;border:none;background:none;border-bottom:2px solid transparent;margin-bottom:-2px;transition:all .2s;font-family:'Outfit',sans-serif}
    .login-tab.active{color:var(--t);border-bottom-color:var(--t)}
    .divider{display:flex;align-items:center;gap:12px;margin:20px 0;color:var(--muted);font-size:.78rem}
    .divider::before,.divider::after{content:'';flex:1;height:1px;background:var(--border)}
    .wa-login{display:flex;align-items:center;justify-content:center;gap:12px;padding:13px;background:#f0fdf4;border:1.5px solid #22c55e;border-radius:12px;color:#166534;font-weight:700;font-size:.88rem;cursor:pointer;transition:all .2s;text-decoration:none;width:100%;box-sizing:border-box}
    .wa-login:hover{background:#dcfce7}
    .alert-box{padding:10px 14px;border-radius:10px;font-size:.82rem;margin-bottom:14px}
    .alert-success{background:#d1fae5;color:#065f46}
    .alert-error{background:#fee2e2;color:#991b1b}
    #tabLogin,#tabRegister{display:block}
  </style>
</head>
<body>
<div id="header-mount"></div>

<div class="login-wrapper">
  <div class="login-card">
    <div class="login-logo">
      <div style="position:relative;width:48px;height:48px;flex-shrink:0">
        <img src="assets/logo.png" style="width:48px;height:48px;border-radius:50%;object-fit:cover;position:absolute;inset:0;z-index:2" alt="Detoxy Hijama" onerror="this.style.display='none'">
        <svg width="48" height="48" viewBox="0 0 120 120" fill="none" xmlns="http://www.w3.org/2000/svg">
          <defs><radialGradient id="lg2" cx="50%" cy="40%" r="60%"><stop offset="0%" stop-color="#2aab97"/><stop offset="100%" stop-color="#1a3d35"/></radialGradient></defs>
          <circle cx="60" cy="60" r="60" fill="url(#lg2)"/>
          <path d="M60 18c0 0-26 16.5-26 38.5C34 70.7 45.6 82 60 82s26-11.3 26-25.5C86 34.5 60 18 60 18z" fill="white" opacity=".92"/>
          <circle cx="60" cy="68" r="9" fill="#2aab97"/>
        </svg>
      </div>
      <span class="login-logo-name">Detoxy Hijama</span>
    </div>

    <div class="login-tabs">
      <button class="login-tab active" id="btnLogin" onclick="switchTab('login')">Sign In</button>
      <button class="login-tab" id="btnRegister" onclick="switchTab('register')">New Account</button>
    </div>

    <div id="alertBox"></div>

    <!-- LOGIN TAB -->
    <div id="tabLogin">
      <div class="form-group">
        <label class="form-label">Phone / Email</label>
        <input class="form-input" id="loginPhone" placeholder="+91 9XXXXXXXXX or email@example.com"/>
      </div>
      <div class="form-group">
        <label class="form-label">Password</label>
        <input type="password" class="form-input" id="loginPass" placeholder="Your password" onkeydown="if(event.key==='Enter')doLogin()"/>
      </div>
      <button class="btn btn--primary btn--full" onclick="doLogin()" style="margin-bottom:16px">Sign In →</button>

      <div class="divider">or</div>

      <a href="https://wa.me/919566596077?text=Hi%2C%20I%20want%20to%20place%20an%20order.%20Please%20help%20me." target="_blank" class="wa-login">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="#25d366"><path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 01-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 01-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 012.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0012.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 005.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 00-3.48-8.413z"/></svg>
        Order via WhatsApp
      </a>

      <p style="margin-top:20px;font-size:.76rem;text-align:center;color:var(--muted)">
        <a href="index.html" style="color:var(--t)">← Back to shop</a>
        &nbsp;·&nbsp;
        <a href="admin/login.html" style="color:var(--muted)">Admin</a>
      </p>
    </div>

    <!-- REGISTER TAB -->
    <div id="tabRegister" style="display:none">
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px">
        <div class="form-group" style="grid-column:1/-1">
          <label class="form-label">Full Name</label>
          <input class="form-input" id="regName" placeholder="Your full name"/>
        </div>
        <div class="form-group">
          <label class="form-label">Phone</label>
          <input class="form-input" id="regPhone" placeholder="+91 XXXXXXXXXX"/>
        </div>
        <div class="form-group">
          <label class="form-label">Email</label>
          <input class="form-input" id="regEmail" placeholder="email@example.com"/>
        </div>
        <div class="form-group" style="grid-column:1/-1">
          <label class="form-label">Password</label>
          <input type="password" class="form-input" id="regPass" placeholder="Min 8 characters"/>
        </div>
        <div class="form-group" style="grid-column:1/-1">
          <label class="form-label">City</label>
          <input class="form-input" id="regCity" placeholder="Your city"/>
        </div>
      </div>
      <button class="btn btn--primary btn--full" onclick="doRegister()" style="margin-bottom:16px">Create Account →</button>
      <p style="font-size:.74rem;color:var(--muted);text-align:center">By creating an account you agree to our terms. Your data is used only for order management.</p>
    </div>
  </div>
</div>

<div id="footer-mount"></div>
<script src="config.js"></script>
<script src="shared.js"></script>
<script>
  document.getElementById('header-mount').innerHTML = getNavHTML('');
  document.getElementById('footer-mount').innerHTML = getFooterHTML();

  function switchTab(t) {
    document.getElementById('tabLogin').style.display = t === 'login' ? 'block' : 'none';
    document.getElementById('tabRegister').style.display = t === 'register' ? 'block' : 'none';
    document.getElementById('btnLogin').classList.toggle('active', t === 'login');
    document.getElementById('btnRegister').classList.toggle('active', t === 'register');
    document.getElementById('alertBox').innerHTML = '';
  }

  function showAlert(msg, type) {
    document.getElementById('alertBox').innerHTML = `<div class="alert-box alert-${type}">${msg}</div>`;
  }

  function doLogin() {
    const id = document.getElementById('loginPhone').value.trim();
    const pass = document.getElementById('loginPass').value;
    if (!id || !pass) { showAlert('Please enter your phone/email and password.', 'error'); return; }
    const users = JSON.parse(localStorage.getItem('detoxy_customers') || '[]');
    const hashedPass = btoa(pass);
    const user = users.find(u => (u.phone === id || u.email === id) && u.password === hashedPass);
    if (user) {
      sessionStorage.setItem('detoxy_customer', JSON.stringify({ name: user.name, phone: user.phone, email: user.email }));
      showAlert('Welcome back, ' + user.name + '! Redirecting...', 'success');
      setTimeout(() => window.location.href = 'index.html', 1200);
    } else {
      showAlert('Incorrect phone/email or password. New customer? Create an account.', 'error');
    }
  }

  function doRegister() {
    const name = document.getElementById('regName').value.trim();
    const phone = document.getElementById('regPhone').value.trim();
    const email = document.getElementById('regEmail').value.trim();
    const pass = document.getElementById('regPass').value;
    const city = document.getElementById('regCity').value.trim();
    if (!name || !phone || !pass) { showAlert('Name, phone and password are required.', 'error'); return; }
    if (pass.length < 8) { showAlert('Password must be at least 8 characters.', 'error'); return; }
    if (!/^[6-9]\d{9}$/.test(phone.replace(/\s+/g,''))) { showAlert('Please enter a valid 10-digit Indian mobile number.', 'error'); return; }
    const users = JSON.parse(localStorage.getItem('detoxy_customers') || '[]');
    if (users.find(u => u.phone === phone)) { showAlert('An account with this phone already exists. Please sign in.', 'error'); return; }
    users.push({ name, phone, email, password: btoa(pass), city, joinedAt: new Date().toISOString() });
    localStorage.setItem('detoxy_customers', JSON.stringify(users));
    sessionStorage.setItem('detoxy_customer', JSON.stringify({ name, phone, email }));
    showAlert('Account created! Welcome, ' + name + '! Redirecting...', 'success');
    setTimeout(() => window.location.href = 'index.html', 1200);
  }
</script>
</body>
</html>
