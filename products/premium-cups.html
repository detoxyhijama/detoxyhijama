<script>
var PRODUCT_ID    = 'premium-cups';
var PRODUCT_NAME  = 'Detoxy Hijama Premium China Made Cups';
var UNIT_PRICE    = 649;
var SIZES         = ['Size 1','Size 2','Size 3','Size 4','Size 5','Size 6','Curve Cup 3','Curve Cup 4'];

document.addEventListener('DOMContentLoaded', function() {
  var hm = document.getElementById('header-mount');
  if (hm) {
    var frag = document.createRange().createContextualFragment(renderHeader(''));
    hm.replaceWith(frag);
    Cart.updateUI(); initSearch(); initMobileNav(); updateNavAuthLink();
  }
  var fm = document.getElementById('footer-mount');
  if (fm) fm.outerHTML = renderFooter();
  buildThumbs();
});

function buildThumbs() {
  var thumbs = document.getElementById('thumbs');
  var images = ['/assets/images/products/premium-cups/main.jpg'];
  for (var i=2; i<=8; i++) images.push('/assets/images/products/premium-cups/image'+i+'.jpg');
  images.forEach(function(src, i) {
    var img = document.createElement('img');
    img.src = src; img.className = 'pd-img-thumb' + (i===0?' active':'');
    img.alt = PRODUCT_NAME;
    img.onerror = function(){ this.style.display='none'; };
    img.onclick = function() {
      document.getElementById('mainImg').src = src;
      document.querySelectorAll('.pd-img-thumb').forEach(function(t){t.classList.remove('active');});
      img.classList.add('active');
    };
    thumbs.appendChild(img);
  });
}

function changeVariantQty(size, delta) {
  var key   = 'varqty-' + size.replace(/ /g,'-');
  var input = document.getElementById(key);
  if (!input) return;
  var val = Math.max(0, Math.min(999, (parseInt(input.value)||0) + delta));
  input.value = val;
  updateVariantTotal();
}

function updateVariantTotal() {
  var totalItems = 0, totalPrice = 0;
  SIZES.forEach(function(size) {
    var key   = 'varqty-' + size.replace(/ /g,'-');
    var subKey = 'sub-' + size.replace(/ /g,'-');
    var qty   = parseInt((document.getElementById(key)||{}).value||'0')||0;
    var sub   = qty * UNIT_PRICE;
    if (qty > 0) totalItems++;
    totalPrice += sub;
    var subEl = document.getElementById(subKey);
    if (subEl) subEl.textContent = sub > 0 ? '₹'+sub.toLocaleString('en-IN') : '₹0';
  });
  document.getElementById('varTotalItems').textContent = totalItems + ' size' + (totalItems!==1?'s':'') + ' selected';
  document.getElementById('varTotalPrice').textContent = '₹' + totalPrice.toLocaleString('en-IN');
}

function addVariantsToCart() {
  var added = 0;
  SIZES.forEach(function(size) {
    var key = 'varqty-' + size.replace(/ /g,'-');
    var qty = parseInt((document.getElementById(key)||{}).value||'0')||0;
    if (qty > 0) {
      Cart.add({
        id:    PRODUCT_ID + '-' + size.replace(/ /g,'-').toLowerCase(),
        name:  PRODUCT_NAME,
        size:  size,
        price: UNIT_PRICE,
        qty:   qty,
        image: '/assets/images/products/premium-cups/main.jpg'
      });
      added++;
    }
  });
  if (added === 0) {
    alert('Please select at least one size and quantity.');
    return;
  }
  Cart.updateUI();
  // Show confirmation
  var btn = document.querySelector('.pd-add-btn');
  btn.textContent = '✓ Added ' + added + ' size(s) to cart!';
  btn.style.background = 'var(--success)';
  setTimeout(function() {
    btn.innerHTML = '<svg fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2" style="width:16px;height:16px;margin-right:8px"><path stroke-linecap="round" stroke-linejoin="round" d="M3 3h2l.4 2M7 13h10l4-8H5.4"/></svg>Add to Cart';
    btn.style.background = '';
  }, 2500);
}
</script>
