<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1"/>
  <title>All Products — Detoxy Hijama</title>
  <meta name="description" content="Shop all Detoxy Hijama products. Hijama cups, kits, tools, and consumables. Direct manufacturer prices. Pan India delivery."/>
  <link rel="stylesheet" href="assets/style.css"/>
  <style>
    .products-page { display: grid; grid-template-columns: 260px 1fr; gap: 32px; padding: 40px 0 72px; }
    /* SIDEBAR */
    .sidebar { position: sticky; top: 90px; align-self: flex-start; }
    .filter-section { background: #fff; border: 1px solid var(--border); border-radius: var(--radius); padding: 24px; margin-bottom: 16px; }
    .filter-title { font-size: .8rem; font-weight: 700; text-transform: uppercase; letter-spacing: .1em; color: var(--muted); margin-bottom: 16px; }
    .filter-option { display: flex; align-items: center; gap: 10px; padding: 8px 0; cursor: pointer; }
    .filter-option input[type=checkbox], .filter-option input[type=radio] { width: 16px; height: 16px; accent-color: var(--teal-dark); cursor: pointer; }
    .filter-label { font-size: .88rem; color: var(--text); flex: 1; cursor: pointer; }
    .filter-count { font-size: .75rem; color: var(--muted); background: var(--cream); padding: 2px 7px; border-radius: 10px; }
    .price-range { display: flex; gap: 10px; align-items: center; margin-top: 8px; }
    .price-range input { flex: 1; padding: 8px; border: 1.5px solid var(--border); border-radius: var(--radius-sm); font-size: .85rem; width: 100%; }
    /* PRODUCTS AREA */
    .products-area {}
    .products-toolbar { display: flex; align-items: center; justify-content: space-between; margin-bottom: 24px; gap: 12px; }
    .active-filters { display: flex; flex-wrap: wrap; gap: 8px; flex: 1; }
    .filter-tag {
      display: flex; align-items: center; gap: 6px;
      background: rgba(45,212,191,.1); color: var(--teal-dark);
      border: 1px solid rgba(45,212,191,.25); border-radius: 20px;
      font-size: .78rem; font-weight: 500; padding: 4px 12px;
    }
    .filter-tag-x { cursor: pointer; font-size: .9rem; opacity: .6; }
    .filter-tag-x:hover { opacity: 1; }
    .sort-select { padding: 9px 14px; border: 1.5px solid var(--border); border-radius: var(--radius-sm); font-size: .85rem; background: #fff; color: var(--text); min-width: 180px; }
    .results-count { font-size: .85rem; color: var(--muted); white-space: nowrap; }
    /* Category tabs */
    .cat-tabs { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 24px; }
    .cat-tab {
      padding: 8px 16px; border-radius: 20px; border: 1.5px solid var(--border);
      font-size: .83rem; font-weight: 500; cursor: pointer; transition: var(--transition);
      background: #fff; color: var(--text);
    }
    .cat-tab.active, .cat-tab:hover { background: var(--dark); color: #fff; border-color: var(--dark); }
    @media (max-width: 900px) {
      .products-page { grid-template-columns: 1fr; }
      .sidebar { position: static; display: none; }
      .sidebar.open { display: block; }
    }
    @media (max-width: 640px) {
      .products-toolbar { flex-direction: column; align-items: flex-start; }
    }
  </style>
</head>
<body>
<div class="page-wrapper">
  <div id="header-mount"></div>

  <!-- PAGE HERO -->
  <div style="background: linear-gradient(135deg, var(--dark), var(--mid)); padding: 56px 0 36px;">
    <div class="container">
      <p class="sec-tag">Our Range</p>
      <h1 style="font-family:'Cormorant Garamond',serif;font-size:2rem;font-weight:700;color:#fff;margin-top:8px">All Products</h1>
      <p style="color:rgba(255,255,255,.55);font-size:.95rem;margin-top:8px">Direct from our Pollachi factory — zero middlemen, 100% quality</p>
    </div>
  </div>

  <div class="container">
    <!-- CATEGORY TABS -->
    <div class="cat-tabs" style="margin-top:28px" id="catTabs"></div>

    <div class="products-page">
      <!-- SIDEBAR -->
      <aside class="sidebar" id="sidebar">
        <div class="filter-section">
          <div class="filter-title">Price Range</div>
          <div class="price-range">
            <input type="number" id="priceMin" placeholder="Min ₹" min="0"/>
            <span style="color:var(--muted);font-size:.8rem">to</span>
            <input type="number" id="priceMax" placeholder="Max ₹" min="0"/>
          </div>
          <button onclick="applyPriceFilter()" class="btn btn--dark btn--full" style="margin-top:12px;border-radius:var(--radius-sm);padding:10px">Apply</button>
        </div>
        <div class="filter-section">
          <div class="filter-title">Sort By</div>
          <label class="filter-option"><input type="radio" name="sortR" value="default" checked/><span class="filter-label">Default</span></label>
          <label class="filter-option"><input type="radio" name="sortR" value="price-asc"/><span class="filter-label">Price: Low to High</span></label>
          <label class="filter-option"><input type="radio" name="sortR" value="price-desc"/><span class="filter-label">Price: High to Low</span></label>
          <label class="filter-option"><input type="radio" name="sortR" value="rating"/><span class="filter-label">Top Rated</span></label>
        </div>
        <div class="filter-section">
          <div class="filter-title">Availability</div>
          <label class="filter-option"><input type="checkbox" id="inStockOnly"/><span class="filter-label">In Stock Only</span></label>
        </div>
      </aside>

      <!-- PRODUCTS AREA -->
      <div class="products-area">
        <div class="products-toolbar">
          <div class="active-filters" id="activeFilters"></div>
          <div style="display:flex;align-items:center;gap:12px">
            <span class="results-count" id="resultsCount"></span>
            <select class="sort-select" id="sortSelect">
              <option value="default">Sort: Default</option>
              <option value="price-asc">Price: Low → High</option>
              <option value="price-desc">Price: High → Low</option>
              <option value="rating">Top Rated</option>
            </select>
          </div>
        </div>
        <div class="products-grid" id="productsGrid"></div>
      </div>
    </div>
  </div>

  <div id="footer-mount"></div>
</div>

<script src="config.js"></script>
<script src="shared.js"></script>
<script>
  document.getElementById('header-mount').innerHTML = getNavHTML('Products');
  document.getElementById('footer-mount').innerHTML = getFooterHTML();

  // State
  let state = {
    category: 'all',
    sort: 'default',
    priceMin: 0,
    priceMax: Infinity,
    inStock: false,
  };

  // Parse URL
  const urlParams = new URLSearchParams(location.search);
  if (urlParams.get('cat')) state.category = urlParams.get('cat');

  // Category tabs
  const catTabsEl = document.getElementById('catTabs');
  catTabsEl.innerHTML = CATEGORIES.map(c => `
    <button class="cat-tab${state.category === c.id ? ' active' : ''}" onclick="setCategory('${c.id}')">${c.label}</button>
  `).join('');

  function setCategory(cat) {
    state.category = cat;
    document.querySelectorAll('.cat-tab').forEach(t => t.classList.toggle('active', t.textContent === CATEGORIES.find(c=>c.id===cat)?.label));
    render();
  }

  // Sorting
  document.getElementById('sortSelect').addEventListener('change', e => { state.sort = e.target.value; render(); });
  document.querySelectorAll('input[name=sortR]').forEach(r => r.addEventListener('change', e => { state.sort = e.target.value; document.getElementById('sortSelect').value = e.target.value; render(); }));
  document.getElementById('inStockOnly').addEventListener('change', e => { state.inStock = e.target.checked; render(); });

  function applyPriceFilter() {
    state.priceMin = parseFloat(document.getElementById('priceMin').value) || 0;
    state.priceMax = parseFloat(document.getElementById('priceMax').value) || Infinity;
    render();
  }

  function render() {
    let products = [...PRODUCTS];
    if (state.category !== 'all') products = products.filter(p => p.category === state.category);
    if (state.inStock) products = products.filter(p => p.inStock);
    if (state.priceMin > 0) products = products.filter(p => p.price >= state.priceMin);
    if (state.priceMax < Infinity) products = products.filter(p => p.price <= state.priceMax);
    if (state.sort === 'price-asc') products.sort((a,b) => a.price - b.price);
    else if (state.sort === 'price-desc') products.sort((a,b) => b.price - a.price);
    else if (state.sort === 'rating') products.sort((a,b) => b.rating - a.rating);

    const grid = document.getElementById('productsGrid');
    if (products.length === 0) {
      grid.innerHTML = `<div class="empty-state" style="grid-column:1/-1"><div class="empty-icon">🔍</div><div class="empty-title">No products found</div><div class="empty-sub">Try adjusting your filters</div><a href="products.html" class="btn btn--primary">Clear Filters</a></div>`;
    } else {
      grid.innerHTML = products.map(renderProductCard).join('');
    }
    document.getElementById('resultsCount').textContent = `${products.length} product${products.length !== 1 ? 's' : ''}`;
  }

  render();
</script>
</body>
</html>
