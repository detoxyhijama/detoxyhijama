<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Cart | Detoxy Hijama</title>
  <link rel="stylesheet" href="assets/style.css"/>
  <style>
    .cart-layout{display:grid;grid-template-columns:1fr 340px;gap:32px;align-items:start}
    .cart-table{background:#fff;border:1px solid var(--border);border-radius:var(--radius);overflow:hidden}
    .cart-row{display:grid;grid-template-columns:64px 1fr auto auto;align-items:center;gap:16px;padding:18px 20px;border-bottom:1px solid var(--border)}
    .cart-row:last-child{border-bottom:none}
    .cart-thumb{width:64px;height:64px;object-fit:contain;border-radius:10px;background:var(--cream);border:1px solid var(--border);padding:4px}
    .cart-name{font-weight:600;font-size:.9rem;color:var(--dark)}
    .cart-unit{font-size:.76rem;color:var(--muted)}
    .cart-line-price{font-family:'Cormorant Garamond',serif;font-size:1.1rem;font-weight:700;color:var(--td);text-align:right;min-width:70px}
    .cart-remove{background:none;border:none;color:var(--muted);cursor:pointer;font-size:1.1rem;padding:4px;transition:color .2s}
    .cart-remove:hover{color:var(--red)}
    .summary-card{background:#fff;border:1px solid var(--border);border-radius:var(--radius);padding:24px;position:sticky;top:80px}
    .summary-row{display:flex;justify-content:space-between;font-size:.9rem;margin-bottom:10px}
    .summary-total{border-top:1px solid var(--border);margin-top:14px;padding-top:14px;display:flex;justify-content:space-between;font-weight:700;font-size:1.05rem;color:var(--dark)}
    @media(max-width:768px){.cart-layout{grid-template-columns:1fr}.cart-row{grid-template-columns:48px 1fr auto}}
  </style>
</head>
<body>
<div class="page-wrapper">
  <div id="header-mount"></div>
  <section class="sec">
    <div class="sec-inner">
      <h1 class="sec-h2" style="margin-bottom:28px">Your <span>Cart</span></h1>
      <div id="cartContent"></div>
    </div>
  </section>
  <div id="footer-mount"></div>
</div>
<script src="config.js"></script>
<script src="shared.js"></script>
<script>
  document.getElementById('header-mount').innerHTML = getNavHTML('');
  document.getElementById('footer-mount').innerHTML = getFooterHTML();

  const prods = (window.DETOXY_CONFIG || {}).products || [];

  function renderCart() {
    const items = Cart.get();
    const el = document.getElementById('cartContent');
    if (!items.length) {
      el.innerHTML = `<div class="empty-state"><div class="empty-icon">🛒</div><div class="empty-title">Your cart is empty</div><div class="empty-sub">Add some products to get started</div><a href="products.html" class="btn btn--primary">Browse Products</a></div>`;
      return;
    }
    let subtotal = 0;
    const rows = items.map(item => {
      const p = prods.find(x => x.id === item.id);
      if (!p) return '';
      const lineTotal = p.price * item.qty;
      subtotal += lineTotal;
      const img = (p.images && p.images[0]) || '';
      return `
      <div class="cart-row" id="crow-${p.id}">
        <img class="cart-thumb" src="${img}" alt="${p.name}" onerror="this.src='https://placehold.co/64x64/1a3d35/2dd4bf?text=Item'">
        <div>
          <div class="cart-name"><a href="products/${p.id}.html">${p.name}</a></div>
          <div class="cart-unit">₹${p.price} ${p.unit}</div>
          <div class="qty-control" style="margin-top:8px;width:fit-content">
            <button class="qty-btn" onclick="changeQty('${p.id}',-1)">−</button>
            <input type="number" class="qty-input" value="${item.qty}" min="1" style="width:44px" onchange="setQty('${p.id}',this.value)">
            <button class="qty-btn" onclick="changeQty('${p.id}',1)">+</button>
          </div>
        </div>
        <div class="cart-line-price">₹${lineTotal}</div>
        <button class="cart-remove" onclick="removeItem('${p.id}')" title="Remove">✕</button>
      </div>`;
    }).join('');
    const shipping = subtotal >= 999 ? 0 : 60;
    const total = subtotal + shipping;
    el.innerHTML = `
    <div class="cart-layout">
      <div>
        <div class="cart-table">${rows}</div>
        <button onclick="Cart.clear();renderCart()" style="margin-top:14px;font-size:.8rem;color:var(--muted);background:none;border:none;cursor:pointer;text-decoration:underline">Clear cart</button>
      </div>
      <div class="summary-card">
        <h3 style="font-family:'Cormorant Garamond',serif;font-size:1.3rem;font-weight:700;color:var(--dark);margin-bottom:18px">Order Summary</h3>
        <div class="summary-row"><span style="color:var(--muted)">Subtotal</span><span>₹${subtotal}</span></div>
        <div class="summary-row"><span style="color:var(--muted)">Shipping</span><span>${shipping === 0 ? '<span style="color:var(--t)">FREE</span>' : '₹' + shipping}</span></div>
        ${shipping > 0 ? `<div style="font-size:.75rem;color:var(--muted);margin-bottom:8px">Add ₹${999-subtotal} more for free shipping</div>` : ''}
        <div class="summary-total"><span>Total</span><span style="color:var(--td)">₹${total}</span></div>
        <a href="checkout.html" class="btn btn--primary btn--full" style="margin-top:18px">Proceed to Checkout →</a>
        <a href="products.html" class="btn btn--outline btn--full" style="margin-top:10px">Continue Shopping</a>
      </div>
    </div>`;
  }

  function changeQty(id, d) {
    const items = Cart.get();
    const i = items.findIndex(x => x.id === id);
    if (i > -1) {
      items[i].qty = Math.max(1, items[i].qty + d);
      Cart.save(items);
    }
    renderCart();
  }
  function setQty(id, val) {
    Cart.updateQty(id, parseInt(val) || 1);
    renderCart();
  }
  function removeItem(id) {
    Cart.remove(id);
    renderCart();
  }
  renderCart();
</script>
</body>
</html>
