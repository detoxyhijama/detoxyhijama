<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Shopping Cart | Detoxy Hijama</title>
  <meta name="robots" content="noindex,nofollow"/>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@600;700&family=Outfit:wght@400;500;600;700&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="assets/style.css"/>
  <style>
    .cart-page{display:grid;grid-template-columns:1fr 360px;gap:32px;padding:40px 0 80px;align-items:start}
    .cart-items{background:var(--white);border:1px solid var(--border);border-radius:var(--radius);overflow:hidden}
    .cart-items-head{padding:20px 24px;border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:center}
    .cart-items-head h2{font-size:1.1rem;font-weight:700;color:var(--dark)}
    .cart-item{display:grid;grid-template-columns:80px 1fr auto;gap:16px;padding:20px 24px;border-bottom:1px solid var(--border);align-items:start}
    .cart-item:last-child{border-bottom:none}
    .cart-item-img{width:80px;height:80px;border-radius:10px;object-fit:cover;border:1px solid var(--border)}
    .cart-item-name{font-weight:700;font-size:.9rem;color:var(--dark);margin-bottom:4px;line-height:1.4}
    .cart-item-cat{font-size:.75rem;color:var(--muted);margin-bottom:10px}
    .cart-item-price{font-size:.95rem;font-weight:700;color:var(--dark);font-family:'Cormorant Garamond',serif}
    .cart-item-remove{font-size:.75rem;color:var(--error);background:none;border:none;cursor:pointer;margin-top:8px;padding:0;display:flex;align-items:center;gap:4px}
    .cart-item-remove svg{width:13px;height:13px}
    .cart-item-right{display:flex;flex-direction:column;align-items:flex-end;gap:8px}
    .cart-item-subtotal{font-size:.95rem;font-weight:700;color:var(--dark)}

    .cart-summary{background:var(--white);border:1px solid var(--border);border-radius:var(--radius);padding:24px;position:sticky;top:calc(var(--nav-h) + 20px)}
    .summary-title{font-size:1rem;font-weight:700;color:var(--dark);margin-bottom:20px;padding-bottom:14px;border-bottom:1px solid var(--border)}
    .summary-row{display:flex;justify-content:space-between;align-items:center;font-size:.88rem;color:var(--muted);margin-bottom:12px}
    .summary-row strong{color:var(--dark)}
    .summary-divider{border:none;border-top:1px solid var(--border);margin:16px 0}
    .summary-total{display:flex;justify-content:space-between;align-items:center;font-weight:700;color:var(--dark);font-size:1.05rem}
    .coupon-row{display:flex;gap:8px;margin-bottom:16px}
    .coupon-row input{flex:1;padding:10px 12px;border:1.5px solid var(--border);border-radius:7px;font-size:.85rem;outline:none}
    .coupon-row input:focus{border-color:var(--t)}
    .shipping-note{background:var(--tp);border-radius:8px;padding:10px 14px;font-size:.8rem;color:var(--td);display:flex;align-items:center;gap:8px;margin-bottom:16px}
    .shipping-note svg{width:14px;height:14px;flex-shrink:0}

    @media(max-width:800px){.cart-page{grid-template-columns:1fr}.cart-summary{position:static}}
    @media(max-width:500px){.cart-item{grid-template-columns:64px 1fr;}.cart-item-right{flex-direction:row;align-items:center}.cart-item-img{width:64px;height:64px}}
  </style>
</head>
<body>
<div id="header-mount" data-page=""></div>

<section class="page-hero">
  <div class="container">
    <nav class="breadcrumb" aria-label="Breadcrumb">
      <a href="index.html">Home</a>
      <svg fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><polyline points="9 18 15 12 9 6"/></svg>
      <span aria-current="page">Shopping Cart</span>
    </nav>
    <h1>Shopping Cart</h1>
  </div>
</section>

<div class="container">
  <div class="cart-page" id="cartPage">
    <!-- Loaded by JS -->
  </div>
</div>

<div id="footer-mount"></div>
<script src="assets/js/shared.js"></script>
<script>
document.addEventListener('DOMContentLoaded', function() {
  var hm = document.getElementById('header-mount');
  if (hm) {
    var frag = document.createRange().createContextualFragment(renderHeader(''));
    hm.replaceWith(frag);
    Cart.updateUI();
    initSearch();
    initMobileNav();
  }
  var fm = document.getElementById('footer-mount');
  if (fm) fm.outerHTML = renderFooter();
  renderCart();
});

function renderCart() {
  var items = Cart.get();
  var page = document.getElementById('cartPage');
  if (!page) return;

  if (items.length === 0) {
    page.innerHTML = '<div style="grid-column:1/-1"><div class="empty-state"><div class="empty-state-icon"><svg fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.5"><path stroke-linecap="round" stroke-linejoin="round" d="M3 3h2l.4 2M7 13h10l4-8H5.4M7 13L5.4 5M7 13l-2.293 2.293c-.63.63-.184 1.707.707 1.707H17m0 0a2 2 0 100 4 2 2 0 000-4zm-8 2a2 2 0 11-4 0 2 2 0 014 0z"/></svg></div><h3>Your cart is empty</h3><p>Add some products to get started</p><a href="products.html" class="btn btn-primary">Shop Now</a></div></div>';
    return;
  }

  var subtotal = Cart.total();
  var shipping = subtotal >= 999 ? 0 : 60;
  var total = subtotal + shipping;

  var itemsHtml = items.map(function(item) {
    var p = PRODUCTS.find(function(x){ return x.id === item.id; });
    if (!p) return '';
    return '<div class="cart-item" id="ci-'+p.id+'">' +
      '<img src="'+p.images[0]+'" alt="'+p.name+'" class="cart-item-img" onerror="this.src=\'assets/images/placeholder.svg\'">' +
      '<div>' +
        '<div class="cart-item-name">'+p.name+'</div>' +
        '<div class="cart-item-cat">'+p.categoryLabel+'</div>' +
        '<div class="qty-control">' +
          '<button class="qty-btn" onclick="updateQty(\''+p.id+'\','+(item.qty-1)+')">-</button>' +
          '<input type="number" class="qty-input" value="'+item.qty+'" min="1" max="20" onchange="updateQty(\''+p.id+'\',parseInt(this.value))">' +
          '<button class="qty-btn" onclick="updateQty(\''+p.id+'\','+(item.qty+1)+')">+</button>' +
        '</div>' +
        '<button class="cart-item-remove" onclick="removeItem(\''+p.id+'\')"><svg fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"/></svg> Remove</button>' +
      '</div>' +
      '<div class="cart-item-right">' +
        '<div class="cart-item-subtotal">'+fmtINR(p.price * item.qty)+'</div>' +
        '<div style="font-size:.76rem;color:var(--muted)">'+fmtINR(p.price)+' each</div>' +
      '</div>' +
    '</div>';
  }).join('');

  page.innerHTML =
    '<div class="cart-items">' +
      '<div class="cart-items-head"><h2>Cart Items ('+items.length+')</h2><button onclick="Cart.clear();renderCart();" style="font-size:.78rem;color:var(--error);background:none;border:none;cursor:pointer;font-weight:600">Clear Cart</button></div>' +
      itemsHtml +
    '</div>' +
    '<div class="cart-summary">' +
      '<div class="summary-title">Order Summary</div>' +
      (shipping === 0 ? '<div class="shipping-note"><svg fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M5 13l4 4L19 7"/></svg>You qualify for free shipping!</div>' : '<div class="shipping-note"><svg fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M13 16h-1v-4h-1m1-4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"/></svg>Add '+ fmtINR(999 - subtotal) +' more for free shipping</div>') +
      '<div class="summary-row"><span>Subtotal</span><strong>'+fmtINR(subtotal)+'</strong></div>' +
      '<div class="summary-row"><span>Shipping</span><strong>'+(shipping === 0 ? 'FREE' : fmtINR(shipping))+'</strong></div>' +
      '<hr class="summary-divider">' +
      '<div class="summary-total"><span>Total</span><span>'+fmtINR(total)+'</span></div>' +
      '<div style="margin-top:20px;display:flex;flex-direction:column;gap:10px">' +
        '<a href="checkout.html" class="btn btn-primary btn-block btn-lg">Proceed to Checkout</a>' +
        '<a href="products.html" class="btn btn-outline btn-block">Continue Shopping</a>' +
      '</div>' +
      '<p style="font-size:.73rem;color:var(--muted);margin-top:14px;text-align:center">Secure checkout · COD available · 7-day returns</p>' +
    '</div>';
}

function updateQty(id, qty) {
  Cart.updateQty(id, qty);
  renderCart();
}

function removeItem(id) {
  Cart.remove(id);
  renderCart();
  showToast('Item removed from cart');
}
</script>
</body>
</html>
