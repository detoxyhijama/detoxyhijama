<body>
<div id="header-mount" data-page=""></div>

<div class="container" style="padding-top:24px">

    <a href="../index.html">Home</a>
    <svg fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><polyline points="9 18 15 12 9 6"/></svg>

  </nav>
</div>

<div class="container">
  <div class="pd-page" id="productPage">
    <div class="empty-state" style="grid-column:1/-1">
      <p>Loading product...</p>
    </div>
  </div>
</div>

<div id="footer-mount"></div>
<script src="../assets/js/shared.js"></script>
<script>
document.addEventListener('DOMContentLoaded', function() {
  var hm = document.getElementById('header-mount');
  if (hm) {
    /* FIX 1: Removed redundant Cart.updateUI/initSearch/initMobileNav calls.
       shared.js DOMContentLoaded already calls all three after mounting header/footer.
       Double-calling initMobileNav would attach duplicate event listeners to navToggle. */
    var frag = document.createRange().createContextualFragment(renderHeader(''));
    hm.replaceWith(frag);
  }
  var fm = document.getElementById('footer-mount');
  if (fm) fm.outerHTML = renderFooter();

  // Get product slug from URL
  var slug = window.location.pathname.split('/').pop().replace('.html','');
  var p = PRODUCTS.find(function(x){ return x.slug === slug; });

  if (!p) {
    document.getElementById('productPage').innerHTML = '<div class="empty-state" style="grid-column:1/-1"><div class="empty-state-icon"><svg fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.5"><path stroke-linecap="round" stroke-linejoin="round" d="M9.172 16.172a4 4 0 015.656 0M9 10h.01M15 10h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"/></svg></div><h3>Product not found</h3><a href="../products.html" class="btn btn-primary">Browse All Products</a></div>';
    return;
  }

  // Update page meta
  document.getElementById('pageTitle').textContent = p.name + ' | Detoxy Hijama';
  document.getElementById('pageDesc').setAttribute('content', p.shortDesc + ' ' + fmtINR(p.price) + '. Factory direct from Detoxy Hijama, Madurai.');
  document.getElementById('breadcrumbCurrent').textContent = p.name;

  // Structured data
  document.getElementById('productSchemaScript').textContent = JSON.stringify({
    '@context': 'https://schema.org',
    '@type': 'Product',
    name: p.name,
    description: p.description,
    image: p.images,
    sku: p.id,
    brand: { '@type': 'Brand', name: 'Detoxy Hijama' },
    offers: {
      '@type': 'Offer',
      price: p.price,
      priceCurrency: 'INR',
      availability: p.stock > 0 ? 'https://schema.org/InStock' : 'https://schema.org/OutOfStock',
      seller: { '@type': 'Organization', name: 'Detoxy Hijama' }
    },
    aggregateRating: {
      '@type': 'AggregateRating',
      ratingValue: p.rating,
      reviewCount: p.reviews
    }
  });

  var discount = discountPct(p.price, p.mrp);

  // Build gallery thumbs
  var thumbsHtml = p.images.map(function(img, i) {
    return '<div class="pd-thumb'+(i===0?' active':'')+'" onclick="switchImg(this,\'/'+img+'\')"><img src="/'+img+'" alt="'+p.name+' view '+(i+1)+'" loading="lazy"></div>';
  }).join('');

  // Features list
  var featHtml = (p.features || []).map(function(f) {
    return '<li><svg fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5"><path stroke-linecap="round" stroke-linejoin="round" d="M5 13l4 4L19 7"/></svg>'+f+'</li>';
  }).join('');

  // Specs table
  var specsHtml = Object.entries(p.specs || {}).map(function(kv) {
    return '<tr><td>'+kv[0]+'</td><td>'+kv[1]+'</td></tr>';
  }).join('');

  document.getElementById('productPage').innerHTML =
    // GALLERY
    '<div class="pd-gallery">' +
      '<div class="pd-main-img"><img id="mainImg" src="/'+p.images[0]+'" alt="'+p.name+'" loading="eager"></div>' +
      (p.images.length > 1 ? '<div class="pd-thumbs">'+thumbsHtml+'</div>' : '') +
    '</div>' +
    // INFO
    '<div class="pd-info">' +
      '<div class="pd-category">'+p.categoryLabel+'</div>' +
      '<h1 class="pd-name">'+p.name+'</h1>' +
      '<div class="pd-rating-row">'+renderStars(p.rating)+'<span class="pd-review-count">('+p.reviews+' reviews)</span></div>' +
      '<div class="pd-price-row">' +
        '<span class="pd-price">'+fmtINR(p.price)+'</span>' +
        (p.mrp > p.price ? '<span class="pd-mrp">'+fmtINR(p.mrp)+'</span><span class="pd-off">'+discount+'% off</span>' : '') +
      '</div>' +
      '<div class="pd-stock"><span class="stock-dot '+(p.stock > 0 ? 'in' : 'out')+'"></span><span>'+(p.stock > 0 ? 'In Stock — Ready to Ship' : 'Out of Stock')+'</span></div>' +
      '<p class="pd-short-desc">'+p.shortDesc+'</p>' +
      '<div class="pd-features"><h4>Key Features</h4><ul class="pd-feature-list">'+featHtml+'</ul></div>' +
      '<div class="pd-qty-row"><span class="pd-qty-label">Quantity:</span><div class="qty-control"><button class="qty-btn" onclick="adjustQty(-1)">-</button><input type="number" id="pdQty" class="qty-input" value="1" min="1" max="20"><button class="qty-btn" onclick="adjustQty(1)">+</button></div></div>' +
      '<div class="pd-actions">' +
        '<a href="../checkout.html?buy='+p.id+'" class="btn btn-primary">Buy Now</a>' +
        '<button class="btn btn-outline" onclick="addToCartPD()">Add to Cart</button>' +
      '</div>' +
      '<div class="pd-trust">' +
        '<div class="pd-trust-item"><svg fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><rect x="1" y="3" width="15" height="13" rx="1"/><polygon points="16 8 20 8 23 11 23 16 16 16 16 8"/><circle cx="5.5" cy="18.5" r="2.5"/><circle cx="18.5" cy="18.5" r="2.5"/></svg><span>Same Day Dispatch</span></div>' +
        '<div class="pd-trust-item"><svg fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M16 15v-1a4 4 0 00-4-4H8m0 0l3 3m-3-3l3-3m9 14V5a2 2 0 00-2-2H6a2 2 0 00-2 2v16l4-2 4 2 4-2 4 2z"/></svg><span>7-Day Returns</span></div>' +
        '<div class="pd-trust-item"><svg fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M9 12l2 2 4-4m5.618-4.016A11.955 11.955 0 0112 2.944a11.955 11.955 0 01-8.618 3.04A12.02 12.02 0 003 9c0 5.591 3.824 10.29 9 11.622 5.176-1.332 9-6.03 9-11.622 0-1.042-.133-2.052-.382-3.016z"/></svg><span>Secure Checkout</span></div>' +
      '</div>' +
    '</div>';

  // Tabs
  var relatedProds = PRODUCTS.filter(function(x){ return x.id !== p.id && x.category === p.category; }).slice(0, 4);
  var relHtml = relatedProds.length ? '<div class="related-section"><div style="margin-bottom:20px"><h3 style="font-family:\'Cormorant Garamond\',serif;font-size:1.5rem;font-weight:700;color:var(--dark)">You Might Also Like</h3></div><div class="products-grid">'+relatedProds.map(function(rp){ return renderProductCard(rp); })  /* FIX 12: String replacements removed — renderProductCard now uses root-relative paths (/) that work from any directory depth. The old regex replacements would corrupt the already-correct paths. */.join('')+'</div></div>' : '';

  document.getElementById('productPage').insertAdjacentHTML('afterend',
    '<div class="container" style="padding-bottom:80px">' +
    '<div class="pd-tabs">' +
      '<div class="tab-list">' +
        '<button class="tab-btn active" onclick="switchTab(this,\'desc\')">Description</button>' +
        '<button class="tab-btn" onclick="switchTab(this,\'specs\')">Specifications</button>' +
        '<button class="tab-btn" onclick="switchTab(this,\'reviews\')">Reviews ('+p.reviews+')</button>' +
      '</div>' +
      '<div id="tab-desc" class="tab-panel active"><p style="font-size:.9rem;line-height:1.8;color:var(--text)">'+p.description+'</p></div>' +
      '<div id="tab-specs" class="tab-panel"><table class="specs-table"><tbody>'+specsHtml+'</tbody></table></div>' +
      '<div id="tab-reviews" class="tab-panel"><p style="font-size:.88rem;color:var(--muted);padding:24px 0">Showing '+p.reviews+' verified reviews. Average rating: '+p.rating+'/5</p></div>' +
    '</div>' +
    relHtml +
    '</div>'
  );

  // WhatsApp CTA
  document.querySelector('.container .pd-trust').insertAdjacentHTML('afterend',
    '<a href="https://wa.me/919566596077?text=Hi!%20I%20want%20to%20order%20'+encodeURIComponent(p.name)+'%20('+fmtINR(p.price)+')" target="_blank" rel="noopener" class="btn btn-block" style="background:#25d366;color:#fff;border:none;margin-top:12px;font-weight:700"><svg width="17" height="17" viewBox="0 0 24 24" fill="currentColor" style="flex-shrink:0"><path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413z"/></svg>Order via WhatsApp</a>'
  );
});

function switchImg(thumb, src) {
  document.getElementById('mainImg').src = src;
  document.querySelectorAll('.pd-thumb').forEach(function(t){ t.classList.remove('active'); });
  thumb.classList.add('active');
}

function adjustQty(delta) {
  var inp = document.getElementById('pdQty');
  if (!inp) return;
  var v = Math.max(1, Math.min(20, parseInt(inp.value || 1) + delta));
  inp.value = v;
}

function addToCartPD() {
  var inp = document.getElementById('pdQty');
  var qty = parseInt((inp && inp.value) || 1);
  var slug = window.location.pathname.split('/').pop().replace('.html','');
  var p = PRODUCTS.find(function(x){ return x.slug === slug; });
  if (p) Cart.add(p.id, qty);
}

function switchTab(btn, tab) {
  document.querySelectorAll('.tab-btn').forEach(function(b){ b.classList.remove('active'); });
  document.querySelectorAll('.tab-panel').forEach(function(p){ p.classList.remove('active'); });
  btn.classList.add('active');
  var panel = document.getElementById('tab-'+tab);
  if (panel) panel.classList.add('active');
}
</script>
</body>
</html>
