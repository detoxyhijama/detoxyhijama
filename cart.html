<!DOCTYPE html>
<html lang="en">
<head>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,600;0,700;1,400&family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Cart | Detoxy Hijama</title>
  <meta name="robots" content="noindex, nofollow"/>
  <link rel="stylesheet" href="assets/style.css"/>
  <style>
    .free-ship-bar{background:var(--cream);border:1px solid var(--border);border-radius:var(--radius);padding:12px 16px;margin-bottom:20px;font-size:.84rem;color:var(--text)}
    .free-ship-progress{height:6px;background:var(--border);border-radius:6px;margin-top:8px;overflow:hidden}
    .free-ship-fill{height:100%;background:var(--t);border-radius:6px;transition:width .4s}
    .coupon-row{display:flex;gap:10px;margin-bottom:20px}
    .coupon-row input{flex:1}
  </style>
</head>
<body>
<div class="page-wrapper">
  <div id="header-mount"></div>

  <section style="background:var(--cream);padding:24px 0;border-bottom:1px solid var(--border)">
    <div class="sec-inner">
      <nav class="breadcrumb">
        <a href="index.html">Home</a>
        <span class="breadcrumb-sep">›</span>
        <span>Shopping Cart</span>
      </nav>
      <h1 class="sec-h2">Your <span>Cart</span></h1>
    </div>
  </section>

  <section class="sec--sm">
    <div class="sec-inner">
      <div id="cartContent"></div>
    </div>
  </section>

  <div id="footer-mount"></div>
</div>
<script src="config.js"></script>
<script src="shared.js"></script>
<script>
  document.getElementById('header-mount').innerHTML = getNavHTML('');
  document.getElementById('footer-mount').innerHTML = getFooterHTML();
  const prods = (window.DETOXY_CONFIG || {}).products || [];
  const cfg = window.DETOXY_CONFIG || {};
  const freeAt = cfg.freeShippingAt || 999;
  const shipCost = cfg.defaultShipping || 60;

  function renderCart() {
    const items = Cart.get();
    const el = document.getElementById('cartContent');
    if (!items.length) {
      el.innerHTML = `<div class="empty-state"><div class="empty-icon">🛒</div><div class="empty-title">Your cart is empty</div><div class="empty-sub">Add some products to get started</div><a href="products.html" class="btn btn-primary btn-lg" style="margin-top:8px">Browse Products</a></div>`;
      return;
    }
    let subtotal = 0;
    const enriched = items.map(item => {
      const p = prods.find(x=>x.id===item.id);
      if (!p) return null;
      subtotal += p.price * item.qty;
      return { ...item, price: p.price, name: p.name, img: p.images&&p.images[0]||'', unit: p.unit||'' };
    }).filter(Boolean);
    const shipping = subtotal >= freeAt ? 0 : shipCost;
    const total = subtotal + shipping;
    const freePct = Math.min(100, Math.round(subtotal/freeAt*100));

    const rowsHTML = enriched.map(i => `
      <div class="cart-row">
        <img class="cart-thumb" src="${i.img}" alt="${i.name}"
          onerror="this.src='https://placehold.co/72x72/e8f5f2/2aab97?text=P'">
        <div>
          <div class="cart-name">${i.name}</div>
          <div class="cart-unit">₹${i.price.toLocaleString()} each ${i.unit}</div>
          <div class="qty-stepper" style="margin-top:10px;width:120px">
            <button onclick="Cart.updateQty('${i.id}', ${i.qty-1}); if(${i.qty}-1<1) Cart.remove('${i.id}'); renderCart()">−</button>
            <input type="number" value="${i.qty}" min="1" onchange="Cart.updateQty('${i.id}', parseInt(this.value)||1); renderCart()">
            <button onclick="Cart.updateQty('${i.id}', ${i.qty+1}); renderCart()">+</button>
          </div>
        </div>
        <div class="cart-line-price">₹${(i.price*i.qty).toLocaleString()}</div>
        <button class="cart-remove" onclick="Cart.remove('${i.id}'); renderCart()" title="Remove">🗑</button>
      </div>`).join('');

    el.innerHTML = `
      <div class="cart-layout">
        <div>
          <div class="free-ship-bar">
            ${shipping === 0
              ? '<span style="color:var(--green);font-weight:600">✓ Free shipping applied!</span>'
              : `<span>Add <strong>₹${freeAt-subtotal}</strong> more for free shipping</span>`}
            <div class="free-ship-progress"><div class="free-ship-fill" style="width:${freePct}%"></div></div>
          </div>
          <div class="cart-table">${rowsHTML}</div>
          <div style="display:flex;justify-content:space-between;margin-top:16px;flex-wrap:wrap;gap:10px">
            <a href="products.html" class="btn btn-outline">← Continue Shopping</a>
            <button class="btn btn-sm" style="color:var(--red);border:1.5px solid var(--border);background:none;cursor:pointer" onclick="if(confirm('Clear cart?')){Cart.clear();renderCart()}">🗑 Clear Cart</button>
          </div>
        </div>
        <div>
          <div class="summary-card">
            <h3 style="font-family:'Cormorant Garamond',serif;font-size:1.1rem;font-weight:700;color:var(--dark);margin-bottom:16px">Order Summary</h3>
            <div class="summary-row"><span>Subtotal</span><span>₹${subtotal.toLocaleString()}</span></div>
            <div class="summary-row"><span>Shipping</span><span>${shipping===0?'<span style="color:var(--green)">FREE</span>':'₹'+shipping}</span></div>
            <div class="summary-total"><span>Total</span><span>₹${total.toLocaleString()}</span></div>
            <p style="font-size:.75rem;color:var(--muted);margin:10px 0 16px">Inclusive of all taxes. GST invoice available.</p>
            <a href="checkout.html" class="btn btn-primary btn-full btn-lg">Proceed to Checkout →</a>
            <div style="text-align:center;margin-top:14px">
              <div style="display:flex;gap:8px;justify-content:center;flex-wrap:wrap">
                <span class="trust-pill" style="font-size:.68rem">🔒 Secure</span>
                <span class="trust-pill" style="font-size:.68rem">💳 UPI/COD/Card</span>
                <span class="trust-pill" style="font-size:.68rem">↩️ 7-Day Returns</span>
              </div>
            </div>
          </div>
        </div>
      </div>`;
  }
  renderCart();
</script>
</body>
</html>
