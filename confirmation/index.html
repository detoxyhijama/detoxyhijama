  <meta property="og:title" content="Order Confirmed | Detoxy Hijama"/>

  <meta property="og:image" content="https://detoxyhijama.github.io/assets/logo.png"/>

  <meta name="twitter:description" content="Your order has been placed with Detoxy Hijama. We will dispatch within 24 hours and send updates via WhatsApp."/>

</head>
<body>
<div class="page-wrapper">
  <div id="header-mount"></div>
  <section class="sec">
    <div class="sec-inner" style="max-width:600px;text-align:center;padding:80px 5%">
      <div style="width:80px;height:80px;border-radius:50%;background:var(--tp);display:flex;align-items:center;justify-content:center;margin:0 auto 20px;font-size:2.5rem">✅</div>
      <h1 style="font-family:'Cormorant Garamond',serif;font-size:2.2rem;font-weight:700;color:var(--dark);margin-bottom:10px">Order Placed!</h1>
      <p style="font-size:.93rem;color:var(--muted);margin-bottom:28px;line-height:1.75">Thank you for your order. We've received it and will dispatch within 24 hours. You'll receive updates via WhatsApp/SMS.</p>
      <div id="orderId" style="background:var(--tp);border:1px solid var(--border);border-radius:12px;padding:14px 20px;margin-bottom:28px;font-weight:600;color:var(--td)"></div>
      <div style="display:flex;gap:14px;justify-content:center;flex-wrap:wrap">
        <a href="../products.html" class="btn btn-primary">Continue Shopping</a>
        <a href="https://wa.me/919566596077" class="btn btn-outline" target="_blank">💬 Track on WhatsApp</a>
      </div>
    </div>
  </section>
  <div id="footer-mount"></div>
</div>
<script src="../config.js"></script>
<script src="../shared.js"></script>
<script>
  document.getElementById('header-mount').innerHTML = getNavHTML('','../');
  document.getElementById('footer-mount').innerHTML = getFooterHTML('../');
  const id = new URLSearchParams(window.location.search).get('id');
  if (id) {
    document.getElementById('orderId').textContent = 'Order ID: ' + id;
    const order = OrderSync.getLocalOrders().find(o => o.id === id);
    if (order) {
      const el = document.getElementById('orderId');
      el.insertAdjacentHTML('afterend', `
        <div style="margin-top:12px;padding:16px;background:#f9fffe;border:1px solid var(--border);border-radius:12px;font-size:.87rem;text-align:left">
          <div style="display:flex;justify-content:space-between;margin-bottom:8px"><span style="color:var(--muted)">Name</span><span style="font-weight:600">${order.name}</span></div>
          <div style="display:flex;justify-content:space-between;margin-bottom:8px"><span style="color:var(--muted)">Phone</span><span style="font-weight:600">${order.phone}</span></div>
          <div style="display:flex;justify-content:space-between;margin-bottom:8px"><span style="color:var(--muted)">Payment</span><span style="font-weight:600">${order.payment}</span></div>
          <div style="margin-top:10px;padding-top:10px;border-top:1px solid var(--border)"><span style="color:var(--muted)">Items</span><div style="margin-top:6px;font-weight:600;line-height:1.6">${(order.items||'').split(' | ').join('<br>')}</div></div>
          <div style="display:flex;justify-content:space-between;margin-top:12px;font-size:1rem;font-weight:700;color:var(--td)"><span>Total</span><span>&#8377;${order.total}</span></div>
        </div>`);
    }
  }
</script>

<script>
(function(){
  // Scroll reveal
  var els = document.querySelectorAll('.reveal,.reveal-left,.reveal-right,.reveal-scale');
  if('IntersectionObserver' in window){
    var obs = new IntersectionObserver(function(entries){
      entries.forEach(function(e){
        if(e.isIntersecting){ e.target.classList.add('visible'); obs.unobserve(e.target); }
      });
    },{threshold:0.12});
    els.forEach(function(el){ obs.observe(el); });
  } else {
    els.forEach(function(el){ el.classList.add('visible'); });
  }
  // Auto-add reveal to common elements if not already set
  var autoReveal = document.querySelectorAll(
    '.card:not(.reveal):not(.reveal-scale),' +
    '.prod-card:not(.reveal):not(.reveal-scale),' +
    '.why-card:not(.reveal):not(.reveal-scale),' +
    '.cat-card:not(.reveal):not(.reveal-scale),' +
    '.blog-card:not(.reveal):not(.reveal-scale),' +
    '.set-card:not(.reveal):not(.reveal-scale),' +
    '.admin-card:not(.reveal):not(.reveal-scale)'
  );
  autoReveal.forEach(function(el,i){
    el.classList.add('reveal-scale');
    el.style.transitionDelay = (i%5)*0.08 + 's';
    obs && obs.observe(el);
  });
})();
</script>

</body>
</html>
