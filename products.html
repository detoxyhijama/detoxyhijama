<script>
  document.getElementById('header-mount').innerHTML = getNavHTML('Products');
  document.getElementById('footer-mount').innerHTML = getFooterHTML();

  let _cat = 'all';
  const prods = (window.DETOXY_CONFIG || {}).products || [];

  // Handle URL param
  const urlCat = new URLSearchParams(window.location.search).get('cat');
  if (urlCat) {
    _cat = urlCat;
    document.querySelectorAll('.filter-btn').forEach(b => {
      b.classList.toggle('active', b.dataset.cat === _cat);
    });
  }

  function filterProducts(cat, btn) {
    _cat = cat;
    document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
    if (btn) btn.classList.add('active');
    renderProducts();
  }

  function renderProducts() {
    let list = _cat === 'all' ? [...prods] : prods.filter(p => p.cat === _cat);
    const sort = document.getElementById('sortSel').value;
    if (sort === 'price-asc') list.sort((a,b) => a.price - b.price);
    else if (sort === 'price-desc') list.sort((a,b) => b.price - a.price);
    else if (sort === 'rating') list.sort((a,b) => b.rating - a.rating);
    document.getElementById('resultCount').textContent = `Showing ${list.length} products`;
    document.getElementById('productsGrid').innerHTML = list.map(p => getProductCardHTML(p, '')).join('');
  }

  renderProducts();
</script>

<script>
(function(){
  // Scroll reveal
  var els = document.querySelectorAll('.reveal,.reveal-left,.reveal-right,.reveal-scale');
  if('IntersectionObserver' in window){
    var obs = new IntersectionObserver(function(entries){
      entries.forEach(function(e){
        if(e.isIntersecting){ e.target.classList.add('visible'); obs.unobserve(e.target); }
      });
    },{threshold:0.12});
    els.forEach(function(el){ obs.observe(el); });
  } else {
    els.forEach(function(el){ el.classList.add('visible'); });
  }
  // Auto-add reveal to common elements if not already set
  var autoReveal = document.querySelectorAll(
    '.card:not(.reveal):not(.reveal-scale),' +
    '.prod-card:not(.reveal):not(.reveal-scale),' +
    '.why-card:not(.reveal):not(.reveal-scale),' +
    '.cat-card:not(.reveal):not(.reveal-scale),' +
    '.blog-card:not(.reveal):not(.reveal-scale),' +
    '.set-card:not(.reveal):not(.reveal-scale),' +
    '.admin-card:not(.reveal):not(.reveal-scale)'
  );
  autoReveal.forEach(function(el,i){
    el.classList.add('reveal-scale');
    el.style.transitionDelay = (i%5)*0.08 + 's';
    obs && obs.observe(el);
  });
})();
</script>
