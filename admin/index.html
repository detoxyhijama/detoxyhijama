<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Detoxy Hijama — Admin Panel</title>
<meta name="robots" content="noindex,nofollow"/>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&family=Cormorant+Garamond:wght@600;700&display=swap" rel="stylesheet"/>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--t:#2aab97;--td:#1d8a78;--tl:#3ecab5;--tp:#e8f8f5;--cream:#f4f9f8;--dark:#0b1f1c;--mid:#174840;--text:#2a4a45;--muted:#6b9990;--border:#ddecea;--red:#e53935;--green:#16a34a;--blue:#0369a1;--orange:#d97706;--purple:#7c3aed;--sb:220px}
body{font-family:'Outfit',sans-serif;background:var(--cream);color:var(--text);-webkit-font-smoothing:antialiased;overflow-x:hidden}
h1,h2,h3{font-family:'Cormorant Garamond',serif}
a{text-decoration:none;color:inherit}
/* LOGIN */
#loginScreen{position:fixed;inset:0;background:linear-gradient(135deg,var(--dark),var(--mid));display:flex;align-items:center;justify-content:center;z-index:9999}
.lbox{background:#fff;border-radius:24px;padding:44px;width:400px;max-width:94vw;box-shadow:0 24px 80px rgba(0,0,0,.3)}
.lbox h2{font-size:1.5rem;color:var(--dark);margin-bottom:4px}
.lbox p{font-size:.82rem;color:var(--muted);margin-bottom:28px}
.lfield{margin-bottom:14px}
.lfield label{display:block;font-size:.74rem;font-weight:600;text-transform:uppercase;letter-spacing:.06em;color:var(--muted);margin-bottom:6px}
.lfield input{width:100%;padding:12px 14px;border:1.5px solid var(--border);border-radius:10px;font-size:.92rem;font-family:'Outfit',sans-serif;transition:border-color .2s}
.lfield input:focus{outline:none;border-color:var(--t)}
.lbtn{width:100%;background:var(--t);color:#fff;border:none;padding:13px;border-radius:10px;font-size:.95rem;font-weight:700;cursor:pointer;font-family:'Outfit',sans-serif;margin-top:6px;transition:background .2s}
.lbtn:hover{background:var(--td)}
.lerr{color:var(--red);font-size:.82rem;text-align:center;margin-top:10px;display:none}
.lcred{background:var(--tp);border-radius:8px;padding:10px 14px;margin-bottom:14px;font-size:.78rem;color:var(--td)}
/* LAYOUT */
#app{display:none;height:100vh;overflow:hidden}
.sb{position:fixed;left:0;top:0;bottom:0;width:var(--sb);background:var(--dark);display:flex;flex-direction:column;z-index:100;overflow-y:auto}
.sb-top{display:flex;align-items:center;gap:10px;padding:18px 16px;border-bottom:1px solid rgba(255,255,255,.08)}
.sb-top img{width:38px;height:38px;border-radius:50%}
.sb-brand{font-family:'Cormorant Garamond',serif;font-size:1rem;font-weight:700;color:#fff;display:block;line-height:1.1}
.sb-sub{font-size:.58rem;color:var(--tl);text-transform:uppercase;letter-spacing:.1em;font-weight:600}
.sb-nav{padding:10px 0;flex:1}
.sb-gl{font-size:.6rem;text-transform:uppercase;letter-spacing:.1em;color:rgba(255,255,255,.25);font-weight:600;padding:10px 16px 5px}
.sb-btn{display:flex;align-items:center;gap:10px;padding:10px 14px;border-radius:10px;cursor:pointer;color:rgba(255,255,255,.5);font-size:.83rem;font-weight:500;transition:all .2s;margin:1px 8px;background:none;border:none;width:calc(100% - 16px);text-align:left;font-family:'Outfit',sans-serif}
.sb-btn:hover{background:rgba(255,255,255,.07);color:rgba(255,255,255,.85)}
.sb-btn.active{background:rgba(42,171,151,.2);color:var(--tl);font-weight:600}
.sb-btn .ico{width:26px;height:26px;border-radius:7px;display:flex;align-items:center;justify-content:center;font-size:.88rem;flex-shrink:0}
.sb-btn.active .ico{background:rgba(42,171,151,.22)}
.badge-pill{margin-left:auto;background:var(--red);color:#fff;font-size:.58rem;padding:2px 7px;border-radius:50px;font-weight:700}
.sb-foot{padding:14px 16px;border-top:1px solid rgba(255,255,255,.07)}
.logout-btn{display:flex;align-items:center;gap:8px;color:rgba(255,255,255,.35);font-size:.8rem;cursor:pointer;background:none;border:none;font-family:'Outfit',sans-serif;padding:7px 10px;border-radius:8px;width:100%;transition:all .2s}
.logout-btn:hover{color:var(--red);background:rgba(229,57,53,.08)}
/* MAIN */
.main-area{margin-left:var(--sb);height:100vh;overflow-y:auto;display:flex;flex-direction:column}
.topbar{background:#fff;border-bottom:1px solid var(--border);padding:13px 28px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:50}
.topbar-ttl{font-family:'Cormorant Garamond',serif;font-size:1.3rem;font-weight:700;color:var(--dark)}
.topbar-r{display:flex;align-items:center;gap:12px}
.chip{background:var(--tp);color:var(--td);padding:5px 13px;border-radius:50px;font-size:.76rem;font-weight:600}
.content{padding:24px 28px;flex:1}
/* STATS */
.stat-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:16px;margin-bottom:24px}
.sc{background:#fff;border:1px solid var(--border);border-radius:16px;padding:20px;transition:all .2s}
.sc:hover{transform:translateY(-2px);box-shadow:0 8px 24px rgba(0,0,0,.06)}
.sc-ico{width:44px;height:44px;border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:1.3rem;margin-bottom:12px}
.ic-g{background:#dcfce7}.ic-b{background:#dbeafe}.ic-o{background:#fef3c7}.ic-p{background:#ede9fe}.ic-r{background:#fee2e2}
.sc-val{font-family:'Cormorant Garamond',serif;font-size:2rem;font-weight:700;color:var(--dark);line-height:1}
.sc-lbl{font-size:.74rem;color:var(--muted);margin-top:4px}
/* TABLE */
.tcard{background:#fff;border:1px solid var(--border);border-radius:16px;overflow:hidden;margin-bottom:20px}
.tcard-hd{padding:16px 20px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid var(--border)}
.tcard-ttl{font-weight:700;color:var(--dark);font-size:.93rem}
table{width:100%;border-collapse:collapse}
th{background:var(--cream);padding:10px 16px;font-size:.73rem;font-weight:600;color:var(--muted);text-align:left;text-transform:uppercase;letter-spacing:.05em;white-space:nowrap}
td{padding:12px 16px;font-size:.84rem;border-bottom:1px solid var(--border);color:var(--text);vertical-align:middle}
tr:last-child td{border-bottom:none}
tr:hover td{background:#fafffe}
/* BADGE */
.bx{display:inline-flex;align-items:center;padding:3px 10px;border-radius:50px;font-size:.68rem;font-weight:600;white-space:nowrap}
.bx.g{background:#dcfce7;color:var(--green)}
.bx.r{background:#fee2e2;color:var(--red)}
.bx.o{background:#fef3c7;color:var(--orange)}
.bx.b{background:#dbeafe;color:var(--blue)}
.bx.p{background:#ede9fe;color:var(--purple)}
/* BUTTONS */
.btn{display:inline-flex;align-items:center;gap:6px;padding:9px 18px;border-radius:10px;font-size:.83rem;font-weight:600;cursor:pointer;border:none;font-family:'Outfit',sans-serif;transition:all .2s}
.btn:hover{transform:translateY(-1px)}
.btn.pri{background:var(--t);color:#fff}.btn.pri:hover{background:var(--td)}
.btn.sec{background:var(--tp);color:var(--td)}.btn.sec:hover{background:var(--t);color:#fff}
.btn.dan{background:#fee2e2;color:var(--red)}.btn.dan:hover{background:var(--red);color:#fff}
.btn.wa{background:#25d366;color:#fff}.btn.wa:hover{background:#1da851}
.btn.li{background:#0a66c2;color:#fff}.btn.li:hover{background:#004182}
.btn.sm{padding:5px 11px;font-size:.74rem}
/* MODAL */
.moverlay{position:fixed;inset:0;background:rgba(0,0,0,.5);backdrop-filter:blur(4px);z-index:500;display:none;align-items:center;justify-content:center;padding:20px}
.moverlay.open{display:flex}
.mdal{background:#fff;border-radius:20px;padding:32px;width:580px;max-width:100%;max-height:90vh;overflow-y:auto}
.mdal h2{font-size:1.35rem;color:var(--dark);margin-bottom:20px}
/* FORM */
.fg{margin-bottom:14px}
.fg label{display:block;font-size:.74rem;font-weight:600;text-transform:uppercase;letter-spacing:.06em;color:var(--muted);margin-bottom:5px}
.fg input,.fg select,.fg textarea{width:100%;padding:10px 12px;border:1.5px solid var(--border);border-radius:8px;font-size:.88rem;font-family:'Outfit',sans-serif;color:var(--text);background:#fff;transition:border-color .2s}
.fg input:focus,.fg select:focus,.fg textarea:focus{outline:none;border-color:var(--t)}
.fgrow{display:grid;grid-template-columns:1fr 1fr;gap:14px}
/* SEARCH */
.srow{display:flex;gap:10px;margin-bottom:16px;flex-wrap:wrap}
.sinput{flex:1;min-width:200px;padding:9px 14px;border:1.5px solid var(--border);border-radius:10px;font-size:.86rem;font-family:'Outfit',sans-serif;color:var(--text)}
.sinput:focus{outline:none;border-color:var(--t)}
.fsel{padding:9px 13px;border:1.5px solid var(--border);border-radius:10px;font-size:.84rem;font-family:'Outfit',sans-serif;color:var(--text);background:#fff}
/* CHART */
.chart-wrap{display:flex;align-items:flex-end;gap:6px;height:150px;padding:4px 0}
.bw{display:flex;flex-direction:column;align-items:center;gap:3px;flex:1}
.bar{background:linear-gradient(to top,var(--t),var(--tl));border-radius:4px 4px 0 0;min-height:4px;width:100%;transition:height .4s}
.bl{font-size:.62rem;color:var(--muted);white-space:nowrap}
.bv{font-size:.62rem;font-weight:600;color:var(--td)}
@media(max-width:1024px){.stat-grid{grid-template-columns:1fr 1fr}}
@media(max-width:768px){:root{--sb:0px}.sb{transform:translateX(-220px);transition:transform .3s;width:220px}.sb.open{transform:translateX(0)}.main-area{margin-left:0}.content{padding:14px}.mobmenu{display:block!important}}
</style>
</head>
<body>

<!-- LOGIN -->
<div id="loginScreen">
  <div class="lbox">
    <div style="display:flex;align-items:center;gap:12px;margin-bottom:8px">
      <img src="../assets/logo.png" style="width:50px;height:50px;border-radius:50%" alt="Detoxy Hijama"/>
      <div>
        <h2>Admin Panel</h2>
        <p style="margin:0">Detoxy Hijama Cups</p>
      </div>
    </div>
    <div class="lcred">🔐 admin@detoxyhijama.com / Admin@2025Detoxy!</div>
    <div class="lfield"><label>Email</label><input id="lEmail" type="email" value="admin@detoxyhijama.com"/></div>
    <div class="lfield"><label>Password</label><input id="lPass" type="password" value="Admin@2025Detoxy!"/></div>
    <button class="lbtn" onclick="doLogin()">Sign In →</button>
    <div class="lerr" id="lErr">Invalid credentials. Try admin@detoxyhijama.com / Admin@2025Detoxy!</div>
  </div>
</div>

<!-- APP -->
<div id="app">
  <aside class="sb" id="sb">
    <div class="sb-top">
      <img src="../assets/logo.png" alt="logo"/>
      <div><span class="sb-brand">Detoxy Hijama</span><span class="sb-sub">Admin Panel</span></div>
    </div>
    <nav class="sb-nav">
      <div class="sb-gl">Overview</div>
      <button class="sb-btn active" onclick="nav('dashboard',this)"><span class="ico">📊</span>Dashboard</button>
      <div class="sb-gl">Commerce</div>
      <button class="sb-btn" onclick="nav('orders',this)"><span class="ico">📦</span>Orders<span class="badge-pill" id="pendBadge" style="display:none">0</span></button>
      <button class="sb-btn" onclick="nav('products',this)"><span class="ico">🛍️</span>Products</button>
      <button class="sb-btn" onclick="nav('customers',this)"><span class="ico">👥</span>Customers</button>
      <div class="sb-gl">Logistics</div>
      <button class="sb-btn" onclick="nav('shipping',this)"><span class="ico">🚚</span>Shipping</button>
      <button class="sb-btn" onclick="nav('billing',this)"><span class="ico">💳</span>Billing</button>
      <div class="sb-gl">System</div>
      <button class="sb-btn" onclick="nav('settings',this)"><span class="ico">⚙️</span>Settings</button>
    </nav>
    <div class="sb-foot">
      <button class="logout-btn" onclick="logout()">🚪 Sign Out</button>
    </div>
  </aside>

  <main class="main-area">
    <div class="topbar">
      <div style="display:flex;align-items:center;gap:12px">
        <button onclick="document.getElementById('sb').classList.toggle('open')" class="mobmenu" style="display:none;background:none;border:none;font-size:1.3rem;cursor:pointer">☰</button>
        <div class="topbar-ttl" id="pgTitle">Dashboard</div>
      </div>
      <div class="topbar-r">
        <span style="font-size:.8rem;color:var(--muted)">Mohamed Aasiq</span>
        <span class="chip">🛡️ Admin</span>
        <a href="../index.html" target="_blank" style="font-size:.78rem;color:var(--t)">View Site →</a>
      </div>
    </div>
    <div class="content" id="pgContent"></div>
  </main>
</div>

<!-- MODAL -->
<div class="moverlay" id="moverlay" onclick="if(event.target===this)closeMdal()">
  <div class="mdal" id="mdalContent"></div>
</div>

<script>
const CREDS = {email:'admin@detoxyhijama.com', pw:'Admin@2025Detoxy!'};
const API_URL = 'https://script.google.com/macros/s/AKfycbzFt2178utJfKENXEurMTrzVQ7CuhMd_LNmdeB7xPc/exec';

// ── AUTH ──
function doLogin(){
  const e=document.getElementById('lEmail').value.trim();
  const p=document.getElementById('lPass').value;
  if(e===CREDS.email && p===CREDS.pw){
    sessionStorage.setItem('dh_admin','1');
    document.getElementById('loginScreen').style.display='none';
    document.getElementById('app').style.display='flex';
    loadDashboard();
  } else {
    document.getElementById('lErr').style.display='block';
  }
}
function logout(){sessionStorage.removeItem('dh_admin');location.reload();}
document.addEventListener('DOMContentLoaded',()=>{
  if(sessionStorage.getItem('dh_admin')){
    document.getElementById('loginScreen').style.display='none';
    document.getElementById('app').style.display='flex';
    loadDashboard();
  }
  document.getElementById('lPass').onkeydown=e=>{if(e.key==='Enter')doLogin()};
});

// ── API ──
async function api(action,data={}){
  try{
    const r=await fetch(API_URL,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({action,...data})});
    return await r.json();
  }catch(e){return{success:false,error:e.message,offline:true};}
}

// ── NAV ──
function nav(pg,btn){
  document.querySelectorAll('.sb-btn').forEach(b=>b.classList.remove('active'));
  if(btn)btn.classList.add('active');
  const TITLES={dashboard:'Dashboard',orders:'Order Management',products:'Product Catalogue',customers:'Customer Management',shipping:'Shipping Management',billing:'Billing & Finance',settings:'Settings'};
  document.getElementById('pgTitle').textContent=TITLES[pg]||pg;
  const FNS={dashboard:loadDashboard,orders:loadOrders,products:loadProducts,customers:loadCustomers,shipping:loadShipping,billing:loadBilling,settings:loadSettings};
  if(FNS[pg])FNS[pg]();
}

function setContent(h){document.getElementById('pgContent').innerHTML=h;}

function openMdal(h){document.getElementById('mdalContent').innerHTML=h;document.getElementById('moverlay').classList.add('open');}
function closeMdal(){document.getElementById('moverlay').classList.remove('open');}

function fmtDate(d){if(!d)return'—';try{return new Date(d).toLocaleDateString('en-IN',{day:'numeric',month:'short',year:'numeric'});}catch(e){return d;}}
function fmtCur(n){return'₹'+(+n||0).toLocaleString('en-IN');}

// ── DEMO DATA ──
function demoOrders(){
  const names=['Khalid Rahman','Amina Begum','Farhan Ahmed','Zainab Ali','Yusuf Khan','Fatima Noor','Ibrahim Malik','Hafsa Sheikh','Omar Siddiq','Mariam Patel'];
  const cities=['Chennai','Mumbai','Bangalore','Hyderabad','Delhi','Coimbatore','Lucknow','Kochi','Pune','Kolkata'];
  const statuses=['pending','pending','confirmed','processing','dispatched','delivered','delivered','delivered'];
  const products=['Standard Cups ×100','Fire Glass Set ×2','Electric Cup ×1','Silicone Set ×3','Suction Gun ×5','Surgical Blade 100pk ×2','Lancet Pen ×1','Latex Gloves ×3'];
  return Array.from({length:18},(_,i)=>({
    order_id:'ORD-'+String(1001+i),
    customer_name:names[i%names.length],
    customer_phone:'+91-9'+String(500000000+i*7919).slice(0,9),
    city:cities[i%cities.length],
    state:'Tamil Nadu',
    items_summary:products[i%products.length],
    total:Math.round((200+i*137)/10)*10,
    status:statuses[i%statuses.length],
    created_at:new Date(Date.now()-(i*86400000)).toISOString()
  }));
}
function demoCustomers(){
  const orders=demoOrders();
  const map={};
  orders.forEach(o=>{
    if(!map[o.customer_phone])map[o.customer_phone]={name:o.customer_name,phone:o.customer_phone,email:'',city:o.city,state:o.state,total_orders:0,total_spent:0};
    map[o.customer_phone].total_orders++;
    map[o.customer_phone].total_spent+=o.total;
  });
  return Object.values(map);
}
function demoShipments(){
  const carriers=['DTDC','Delhivery','BlueDart','Ekart','India Post'];
  return demoOrders().filter(o=>['processing','dispatched','delivered'].includes(o.status)).map((o,i)=>({
    shipment_id:'SHP-'+String(2001+i),
    order_id:o.order_id,
    customer_name:o.customer_name,
    city:o.city,
    carrier:carriers[i%carriers.length],
    tracking_no:'AWB'+String(100000+i*3),
    status:o.status==='delivered'?'delivered':o.status==='dispatched'?'in_transit':'pending',
    dispatched_at:new Date(Date.now()-(i*86400000*2)).toISOString()
  }));
}

// ── DASHBOARD ──
async function loadDashboard(){
  setContent(`<div style="text-align:center;padding:48px;color:var(--muted);font-size:.9rem">⏳ Loading dashboard...</div>`);
  const res=await api('getDashboard');
  const orders=demoOrders();
  const s={
    totalOrders:res.stats?.totalOrders||orders.length,
    todayOrders:res.stats?.todayOrders||orders.filter(o=>new Date(o.created_at).toDateString()===new Date().toDateString()).length,
    pendingOrders:res.stats?.pendingOrders||orders.filter(o=>o.status==='pending').length,
    totalRevenue:res.stats?.totalRevenue||orders.reduce((s,o)=>s+o.total,0),
    last30Rev:res.stats?.last30Rev||orders.slice(0,10).reduce((s,o)=>s+o.total,0),
    totalCustomers:res.stats?.totalCustomers||demoCustomers().length,
  };
  if(s.pendingOrders>0){const b=document.getElementById('pendBadge');b.textContent=s.pendingOrders;b.style.display='flex';}
  const days=['Mon','Tue','Wed','Thu','Fri','Sat','Sun'];
  const chartData=days.map((d,i)=>({label:d,revenue:Math.round((1200+Math.sin(i)*800+Math.random()*400)/100)*100}));
  const maxR=Math.max(...chartData.map(d=>d.revenue));
  setContent(`
    <div class="stat-grid">
      <div class="sc"><div class="sc-ico ic-b">📦</div><div class="sc-val">${s.totalOrders}</div><div class="sc-lbl">Total Orders</div></div>
      <div class="sc"><div class="sc-ico ic-g">📅</div><div class="sc-val">${s.todayOrders}</div><div class="sc-lbl">Today's Orders</div></div>
      <div class="sc"><div class="sc-ico ic-o">⏳</div><div class="sc-val">${s.pendingOrders}</div><div class="sc-lbl">Pending Orders</div></div>
      <div class="sc"><div class="sc-ico ic-g">💰</div><div class="sc-val">${fmtCur(s.totalRevenue)}</div><div class="sc-lbl">Total Revenue</div></div>
      <div class="sc"><div class="sc-ico ic-b">📈</div><div class="sc-val">${fmtCur(s.last30Rev)}</div><div class="sc-lbl">Last 30 Days</div></div>
      <div class="sc"><div class="sc-ico ic-p">👥</div><div class="sc-val">${s.totalCustomers}</div><div class="sc-lbl">Customers</div></div>
      <div class="sc" style="grid-column:span 2"><div style="display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:12px"><div><div class="sc-ico ic-g" style="display:inline-flex;margin-bottom:6px">🏭</div><div class="sc-val" style="font-size:1.1rem">Detoxy Hijama Cups</div><div class="sc-lbl">Pollachi, Coimbatore, TN 642005 · +91-9566596077</div></div><div style="display:flex;gap:8px"><a href="https://wa.me/919566596077" target="_blank" class="btn wa sm">💬 WhatsApp</a><a href="https://www.linkedin.com/company/detoxy-hijama" target="_blank" class="btn li sm">🔗 LinkedIn</a></div></div></div>
    </div>
    <div style="display:grid;grid-template-columns:1.6fr 1fr;gap:20px">
      <div class="tcard">
        <div class="tcard-hd"><span class="tcard-ttl">Revenue — Last 7 Days</span></div>
        <div style="padding:20px 24px">
          <div class="chart-wrap">
            ${chartData.map(d=>`<div class="bw"><div class="bv">${fmtCur(d.revenue)}</div><div class="bar" style="height:${Math.round(d.revenue/maxR*130)}px"></div><div class="bl">${d.label}</div></div>`).join('')}
          </div>
        </div>
      </div>
      <div class="tcard">
        <div class="tcard-hd"><span class="tcard-ttl">Quick Actions</span></div>
        <div style="padding:18px;display:grid;gap:9px">
          <button class="btn pri" onclick="nav('orders',null);loadOrders('pending')">⏳ Pending Orders (${s.pendingOrders})</button>
          <button class="btn sec" onclick="nav('orders',null);loadOrders()">📦 All Orders</button>
          <button class="btn sec" onclick="nav('products',null);loadProducts()">🛍️ Manage Products</button>
          <button class="btn sec" onclick="nav('shipping',null);loadShipping()">🚚 Shipping</button>
          <a href="https://wa.me/919566596077?text=Hi%2C+checking+in+on+orders" target="_blank" class="btn wa">💬 WhatsApp Support</a>
        </div>
      </div>
    </div>
    <div class="tcard" style="margin-top:20px">
      <div class="tcard-hd"><span class="tcard-ttl">Recent Orders</span><button class="btn sec sm" onclick="nav('orders',null);loadOrders()">View All →</button></div>
      <div style="overflow-x:auto">

function filterOrders(){

}
function updateOrderModal(id,cur){
  openMdal(`<h2>Update Order — ${id}</h2>
    <div style="background:var(--tp);border-radius:10px;padding:12px;margin-bottom:16px;font-size:.84rem;color:var(--td)">Current status: <strong>${cur}</strong></div>
    <div class="fg"><label>New Status</label><select id="ns"><option value="">Select…</option>${['pending','confirmed','processing','dispatched','delivered','cancelled'].map(s=>`<option value="${s}">${s}</option>`).join('')}</select></div>

async function submitOrderUpdate(id){
  const status=document.getElementById('ns').value;
  if(!status){alert('Select a status');return;}
  const r=await api('updateOrder',{id,updates:{status,shipper:document.getElementById('nship').value,tracking_no:document.getElementById('ntrack').value,note:document.getElementById('nnote').value,updated_at:new Date().toISOString()}});
  closeMdal();
  alert(r.success?'Order updated!':'Order updated locally (offline mode). Connect Sheets API to persist.');
  loadOrders(document.getElementById('ofilter')?.value||'all');
}

// ── UTILS ──
function exportCSV(data,fields,fname){
  const rows=[fields.join(','),...data.map(r=>fields.map(f=>'"'+(r[f]||'').toString().replace(/"/g,'""')+'"').join(','))];
  const blob=new Blob([rows.join('\n')],{type:'text/csv'});
  const a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download=fname+'_'+new Date().toISOString().slice(0,10)+'.csv';a.click();
}
