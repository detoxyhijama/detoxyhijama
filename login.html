<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>My Account | Detoxy Hijama</title>
  <meta name="description" content="Login or create your Detoxy Hijama account to track orders and manage your profile."/>
  <meta name="robots" content="noindex,nofollow"/>
  <link rel="canonical" href="https://detoxyhijama.github.io/login.html"/>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;0,700;1,400;1,600&family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="assets/style.css"/>
  <style>
    body { background: var(--cream); min-height: 100vh; display: flex; flex-direction: column; }
    .login-wrapper { flex: 1; display: flex; align-items: center; justify-content: center; padding: 48px 20px; }
    .login-card { background: #fff; border-radius: 24px; padding: 44px 36px; width: 100%; max-width: 420px; border: 1px solid var(--border); box-shadow: var(--shadow-lg); }
    .login-logo { display: flex; align-items: center; justify-content: center; gap: 12px; margin-bottom: 28px; }
    .login-logo-mark { display: none; } /* replaced by real logo */
    .login-logo-img { width: 46px; height: 46px; border-radius: 12px; object-fit: cover; flex-shrink: 0; }
    .login-logo-name { font-family: 'Cormorant Garamond', serif; font-size: 1.35rem; font-weight: 700; color: var(--dark); }
    .login-tabs { display: flex; border-bottom: 2px solid var(--border); margin-bottom: 28px; }
    .login-tab { flex: 1; padding: 12px; text-align: center; font-size: .85rem; font-weight: 600; color: var(--muted); cursor: pointer; border: none; background: none; border-bottom: 2px solid transparent; margin-bottom: -2px; transition: var(--transition); font-family: var(--font-sans); }
    .login-tab.active { color: var(--t); border-bottom-color: var(--t); }
    .divider { display: flex; align-items: center; gap: 12px; margin: 20px 0; color: var(--muted); font-size: .78rem; }
    .divider::before, .divider::after { content: ''; flex: 1; height: 1px; background: var(--border); }
    .wa-btn { display: flex; align-items: center; justify-content: center; gap: 10px; padding: 13px; background: #f0fdf4; border: 1.5px solid #22c55e; border-radius: 12px; color: #166534; font-weight: 700; font-size: .88rem; cursor: pointer; transition: var(--transition); text-decoration: none; width: 100%; box-sizing: border-box; }
    .wa-btn:hover { background: #dcfce7; }
    .wa-btn svg { width: 19px; height: 19px; }
    #tabLogin, #tabRegister { display: block; }
  </style>
  <link rel="icon" type="image/png" href="/assets/images/favicon.png"/>
  <link rel="apple-touch-icon" href="/assets/images/logo-192.png"/>
</head>
<body>
<div id="header-mount" data-page=""></div>

<div class="login-wrapper">
  <div class="login-card">
    <div class="login-logo">
      <img src="/assets/images/logo.png" alt="Detoxy Hijama" class="login-logo-img" width="46" height="46" loading="eager"/>
      <span class="login-logo-name">Detoxy Hijama</span>
    </div>

    <div class="login-tabs">
      <button class="login-tab active" id="btnLogin" onclick="switchTab('Login')">Sign In</button>
      <button class="login-tab" id="btnRegister" onclick="switchTab('Register')">Create Account</button>
    </div>

    <!-- LOGIN FORM -->
    <div id="tabLogin">
      <div id="loginAlert"></div>
      <div class="form-group">
        <label class="form-label" for="loginEmail">Email Address</label>
        <input type="email" id="loginEmail" class="form-control" placeholder="your@email.com" autocomplete="email"/>
      </div>
      <div class="form-group">
        <label class="form-label" for="loginPass">Password</label>
        <input type="password" id="loginPass" class="form-control" placeholder="Your password" autocomplete="current-password"/>
      </div>
      <button class="btn btn-primary btn-block" onclick="doLogin()" style="margin-top:4px">Sign In</button>
      <div class="divider">or continue with</div>
      <a href="https://wa.me/919566596077?text=Hi%20Detoxy!%20I%20want%20to%20track%20my%20order." class="wa-btn" target="_blank" rel="noopener">
        <svg viewBox="0 0 24 24" fill="#25d366"><path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 01-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 01-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 012.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0012.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 005.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 00-3.48-8.413Z"/></svg>
        Track Order via WhatsApp
      </a>
    </div>

    <!-- REGISTER FORM -->
    <div id="tabRegister" style="display:none">
      <div id="registerAlert"></div>
      <div class="form-group">
        <label class="form-label" for="regName">Full Name</label>
        <input type="text" id="regName" class="form-control" placeholder="Your full name" autocomplete="name"/>
      </div>
      <div class="form-group">
        <label class="form-label" for="regEmail">Email Address</label>
        <input type="email" id="regEmail" class="form-control" placeholder="your@email.com" autocomplete="email"/>
      </div>
      <div class="form-group">
        <label class="form-label" for="regPhone">Mobile Number</label>
        <input type="tel" id="regPhone" class="form-control" placeholder="+91 98765 43210" autocomplete="tel"/>
      </div>
      <div class="form-group">
        <label class="form-label" for="regPass">Password</label>
        <input type="password" id="regPass" class="form-control" placeholder="At least 6 characters" autocomplete="new-password"/>
      </div>
      <button class="btn btn-primary btn-block" onclick="doRegister()" style="margin-top:4px">Create Account</button>
    </div>

    <p style="text-align:center;font-size:.75rem;color:var(--muted);margin-top:20px">
      <a href="/index.html" style="color:var(--t)">Continue as Guest</a> — no account needed to order
    </p>
  </div>
</div>

<div id="footer-mount"></div>
<script src="assets/js/shared.js"></script>
<script>
document.addEventListener('DOMContentLoaded', function() {
  var hm = document.getElementById('header-mount');
  if (hm) {
    var frag = document.createRange().createContextualFragment(renderHeader(''));
    hm.replaceWith(frag);
    Cart.updateUI(); initSearch(); initMobileNav();
  }
  var fm = document.getElementById('footer-mount');
  if (fm) fm.outerHTML = renderFooter();

  // Auto-fill if already logged in
  var user = null;
  try { user = JSON.parse(localStorage.getItem('dh_user') || 'null'); } catch(e) {}
  if (user) window.location.href = 'index.html';
});

function switchTab(tab) {
  document.getElementById('tabLogin').style.display = tab === 'Login' ? 'block' : 'none';
  document.getElementById('tabRegister').style.display = tab === 'Register' ? 'block' : 'none';
  document.getElementById('btnLogin').classList.toggle('active', tab === 'Login');
  document.getElementById('btnRegister').classList.toggle('active', tab === 'Register');
}

function doLogin() {
  var email = document.getElementById('loginEmail').value.trim();
  var pass = document.getElementById('loginPass').value;
  var alertEl = document.getElementById('loginAlert');

  if (!email || !pass) { alertEl.innerHTML = '<div class="alert alert-error">Please fill in all fields.</div>'; return; }

  var url = localStorage.getItem('detoxy_sheets_url');
  if (!url) {
    // Local demo mode
    var demoUser = { id: 'demo', name: 'Guest User', email: email };
    localStorage.setItem('dh_user', JSON.stringify(demoUser));
    window.location.href = 'index.html';
    return;
  }

  alertEl.innerHTML = '<div class="alert alert-info">Signing in...</div>';
  fetch(url, { method: 'POST', headers: { 'Content-Type': 'text/plain' }, body: JSON.stringify({ action: 'login', email: email, password: pass }) })
    .then(function(r) { return r.json(); })
    .then(function(data) {
      if (data.success) {
        localStorage.setItem('dh_user', JSON.stringify(data.user));
        window.location.href = 'index.html';
      } else {
        alertEl.innerHTML = '<div class="alert alert-error">' + (data.error || 'Invalid credentials') + '</div>';
      }
    }).catch(function() { alertEl.innerHTML = '<div class="alert alert-error">Connection error. Please try again.</div>'; });
}

function doRegister() {
  var name = document.getElementById('regName').value.trim();
  var email = document.getElementById('regEmail').value.trim();
  var phone = document.getElementById('regPhone').value.trim();
  var pass = document.getElementById('regPass').value;
  var alertEl = document.getElementById('registerAlert');

  if (!name || !email || !pass) { alertEl.innerHTML = '<div class="alert alert-error">Please fill in all required fields.</div>'; return; }
  if (pass.length < 6) { alertEl.innerHTML = '<div class="alert alert-error">Password must be at least 6 characters.</div>'; return; }

  var url = localStorage.getItem('detoxy_sheets_url');
  if (!url) {
    var newUser = { id: 'U' + Date.now(), name: name, email: email, phone: phone };
    localStorage.setItem('dh_user', JSON.stringify(newUser));
    alertEl.innerHTML = '<div class="alert alert-success">Account created! Redirecting...</div>';
    setTimeout(function() { window.location.href = 'index.html'; }, 1000);
    return;
  }

  alertEl.innerHTML = '<div class="alert alert-info">Creating account...</div>';
  fetch(url, { method: 'POST', headers: { 'Content-Type': 'text/plain' }, body: JSON.stringify({ action: 'register', name: name, email: email, phone: phone, password: pass }) })
    .then(function(r) { return r.json(); })
    .then(function(data) {
      if (data.success) {
        alertEl.innerHTML = '<div class="alert alert-success">Account created! You can now sign in.</div>';
        setTimeout(function() { switchTab('Login'); }, 1500);
      } else {
        alertEl.innerHTML = '<div class="alert alert-error">' + (data.error || 'Registration failed') + '</div>';
      }
    }).catch(function() { alertEl.innerHTML = '<div class="alert alert-error">Connection error. Please try again.</div>'; });
}
</script>
</body>
</html>
