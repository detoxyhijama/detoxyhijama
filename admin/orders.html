  <style>
    body{background:#eef2f0;font-family:"Outfit",sans-serif}
    *{box-sizing:border-box}
    .admin-wrap{display:grid;grid-template-columns:248px 1fr;min-height:100vh}
    .admin-sidebar{background:#0d1f1b;padding:20px 14px;position:fixed;width:248px;height:100vh;overflow-y:auto;z-index:100;display:flex;flex-direction:column;gap:0}
    .admin-main{margin-left:248px;padding:28px 32px;min-height:100vh}
    .sidebar-brand{display:flex;align-items:center;gap:11px;padding:4px 8px 18px;margin-bottom:4px;border-bottom:1px solid rgba(255,255,255,.07);flex-shrink:0}
    .sidebar-brand-name{font-family:"Cormorant Garamond",serif;font-size:1rem;color:#fff;font-weight:700;line-height:1.1}
    .sidebar-brand-sub{font-size:.53rem;color:rgba(255,255,255,.3);letter-spacing:.12em;text-transform:uppercase;margin-top:1px}
    .sidebar-section-label{font-size:.6rem;color:rgba(255,255,255,.25);text-transform:uppercase;letter-spacing:.14em;font-weight:700;padding:14px 10px 5px;flex-shrink:0}
    .sidebar-link{display:flex;align-items:center;gap:9px;padding:9px 10px;border-radius:9px;color:rgba(255,255,255,.55);font-size:.82rem;font-weight:500;transition:all .18s;margin-bottom:1px;text-decoration:none;border:none;background:none;cursor:pointer;width:100%;text-align:left;font-family:"Outfit",sans-serif}
    .sidebar-link svg{flex-shrink:0;opacity:.7}
    .sidebar-link:hover,.sidebar-link.active{background:rgba(42,171,151,.16);color:#5eead4}
    .sidebar-link.active svg,.sidebar-link:hover svg{opacity:1}
    .sidebar-bottom{margin-top:auto;padding-top:14px;border-top:1px solid rgba(255,255,255,.07);flex-shrink:0}
    .sidebar-logout{color:rgba(255,140,140,.6)!important}
    .sidebar-logout:hover{background:rgba(255,80,80,.12)!important;color:rgba(255,140,140,.9)!important}
    /* Page header */
    .page-header{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:24px;flex-wrap:wrap;gap:12px}
    .page-title{font-family:"Cormorant Garamond",serif;font-size:1.9rem;font-weight:700;color:#0d1f1b;line-height:1}
    .page-sub{font-size:.8rem;color:#7a9490;margin-top:3px}
    /* Cards */
    .a-card{background:#fff;border-radius:16px;padding:24px;border:1px solid #dde8e5;margin-bottom:20px;box-shadow:0 1px 4px rgba(13,31,27,.04)}
    .a-card h2{font-family:"Cormorant Garamond",serif;font-size:1.15rem;font-weight:700;color:#0d1f1b;margin-bottom:16px;padding-bottom:12px;border-bottom:1px solid #eef2f0;display:flex;align-items:center;gap:8px}
    /* Stat grid */
    .stat-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:16px;margin-bottom:24px}
    .stat-card{background:#fff;border-radius:14px;padding:18px 20px;border:1px solid #dde8e5;display:flex;align-items:center;gap:14px;box-shadow:0 1px 4px rgba(13,31,27,.04)}
    .stat-icon{width:44px;height:44px;border-radius:12px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
    .stat-icon svg{display:block}
    .stat-val{font-family:"Cormorant Garamond",serif;font-size:1.9rem;font-weight:700;color:#0d1f1b;line-height:1}
    .stat-lbl{font-size:.71rem;color:#7a9490;margin-top:2px;font-weight:500}
    .stat-change{font-size:.69rem;color:#16a34a;font-weight:600;margin-top:1px}
    /* Table */
    .a-table{width:100%;border-collapse:collapse}
    .a-table th{font-size:.68rem;text-transform:uppercase;color:#7a9490;font-weight:700;padding:9px 12px;text-align:left;border-bottom:2px solid #eef2f0;white-space:nowrap;background:#f8fbfa}
    .a-table td{padding:11px 12px;border-bottom:1px solid #eef2f0;font-size:.83rem;vertical-align:middle;color:#1a3530}
    .a-table tr:last-child td{border-bottom:none}
    .a-table tr:hover td{background:#f8fbfa}
    /* Status badges */
    .badge{display:inline-flex;align-items:center;gap:3px;padding:3px 9px;border-radius:50px;font-size:.67rem;font-weight:700;white-space:nowrap}
    .badge-new{background:#dcfce7;color:#166534}
    .badge-processing{background:#fef9c3;color:#854d0e}
    .badge-shipped{background:#dbeafe;color:#1e40af}
    .badge-delivered{background:#d1fae5;color:#065f46}
    .badge-quote{background:#ede9fe;color:#5b21b6}
    .badge-cancelled{background:#fee2e2;color:#991b1b}
    /* WA button */
    .wa-btn{display:inline-flex;align-items:center;justify-content:center;padding:5px 9px;background:#25d366;color:#fff;border:none;border-radius:7px;cursor:pointer;transition:background .18s;gap:4px}
    .wa-btn:hover{background:#1fba59}
    /* Modal */
    .modal-ov{position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:2000;display:none;align-items:center;justify-content:center;padding:20px;backdrop-filter:blur(2px)}
    .modal-ov.open{display:flex}
    .modal-box{background:#fff;border-radius:20px;padding:32px;width:100%;max-width:560px;max-height:90vh;overflow-y:auto;box-shadow:0 24px 80px rgba(0,0,0,.18)}
    .modal-title{font-family:"Cormorant Garamond",serif;font-size:1.3rem;font-weight:700;color:#0d1f1b;margin-bottom:20px;padding-bottom:14px;border-bottom:1px solid #eef2f0;display:flex;justify-content:space-between;align-items:center}
    .modal-close{background:none;border:none;cursor:pointer;color:#7a9490;font-size:1.3rem;padding:2px;line-height:1}
    .modal-close:hover{color:#0d1f1b}
    /* Inputs */
    .form-group{margin-bottom:14px}
    .form-label{display:block;font-size:.77rem;font-weight:600;color:#4a6660;margin-bottom:5px}
    .form-input,.form-select,.form-textarea{width:100%;padding:9px 12px;border:1.5px solid #d1ddd9;border-radius:9px;font-size:.85rem;color:#0d1f1b;background:#fff;font-family:"Outfit",sans-serif;transition:border-color .18s}
    .form-input:focus,.form-select:focus,.form-textarea:focus{outline:none;border-color:#2aab97}
    .form-textarea{resize:vertical;line-height:1.6}
    /* Alerts */
    .alert{padding:10px 14px;border-radius:10px;font-size:.82rem;margin-bottom:14px}
    .alert-success{background:#d1fae5;color:#065f46;border:1px solid #a7f3d0}
    .alert-error{background:#fee2e2;color:#991b1b;border:1px solid #fca5a5}
    .alert-info{background:#dbeafe;color:#1e40af;border:1px solid #93c5fd}
    /* Buttons */
    .btn{display:inline-flex;align-items:center;gap:6px;padding:9px 18px;border-radius:10px;font-size:.83rem;font-weight:600;cursor:pointer;border:none;font-family:"Outfit",sans-serif;transition:all .18s;text-decoration:none}
    .btn-primary{background:#2aab97;color:#fff}
    .btn-primary:hover{background:#219e8b}
    .btn-dark{background:#0d1f1b;color:#fff}
    .btn-dark:hover{background:#1a3530}
    .btn-outline{background:transparent;color:#0d1f1b;border:1.5px solid #d1ddd9}
    .btn-outline:hover{border-color:#2aab97;color:#2aab97}
    .btn-danger{background:#fee2e2;color:#991b1b;border:1px solid #fca5a5}
    .btn-danger:hover{background:#fecaca}
    .btn-sm{padding:5px 12px;font-size:.74rem;border-radius:7px}
    .btn-full{width:100%;justify-content:center}
    @media(max-width:960px){.admin-wrap{grid-template-columns:1fr}.admin-sidebar{display:none}.admin-main{margin-left:0;padding:20px}.stat-grid{grid-template-columns:repeat(2,1fr)}}

    .filter-bar{display:flex;gap:10px;margin-bottom:16px;flex-wrap:wrap;align-items:center}
    .order-detail-row{display:grid;grid-template-columns:1fr 1fr;gap:8px 16px;margin-bottom:12px}
    .detail-pair{font-size:.83rem}.detail-pair b{display:block;font-size:.7rem;text-transform:uppercase;color:#7a9490;margin-bottom:1px}
    .items-box{background:#f8fbfa;border-radius:9px;padding:12px;font-size:.82rem;line-height:1.6;border:1px solid #eef2f0;margin-bottom:12px}
  </style>
</head>

<script>
if(sessionStorage.getItem("detoxy_admin")!=="true")window.location.href="login.html";

let orders=OrderSync.getLocalOrders();
const STATUSES=["New","Processing","Shipped","Delivered","Cancelled"];
const BADGE={New:"badge-new",Processing:"badge-processing",Shipped:"badge-shipped",Delivered:"badge-delivered",Quote:"badge-quote",Cancelled:"badge-cancelled"};

function renderOrders(){
  const q=(document.getElementById("orderSearch").value||"").toLowerCase();
  const sf=document.getElementById("statusFilter").value;
  const pf=document.getElementById("payFilter").value;
  let list=orders.filter(o=>{
    const mQ=!q||(o.name||"").toLowerCase().includes(q)||(o.phone||"").includes(q)||(o.company||"").toLowerCase().includes(q)||(o.id||"").includes(q);
    const mS=!sf||o.status===sf||(sf==="Quote"&&o.type==="QUOTE_REQUEST");
    const mP=!pf||(o.payment||"").includes(pf);
    return mQ&&mS&&mP;
  }).slice().reverse();
  document.getElementById("orderCount").textContent=list.length+" orders";
  const tbody=document.getElementById("ordersTbody");
  if(!list.length){tbody.innerHTML=`<tr><td colspan="9" style="text-align:center;padding:40px;color:#7a9490">No orders found.</td></tr>`;return;}
  tbody.innerHTML=list.map(o=>{
    const isQ=o.type==="QUOTE_REQUEST";
    const st=isQ?"Quote":(o.status||"New");
    const realIdx=orders.indexOf(o);
    const date=o.savedAt?new Date(o.savedAt).toLocaleDateString("en-IN",{day:"2-digit",month:"short",year:"2-digit"}):"—";
    return `<tr>
      <td style="font-family:monospace;font-size:.72rem;color:#7a9490">${o.id||"—"}</td>
      <td><div style="font-weight:600;font-size:.84rem">${o.name||o.company||"—"}</div>${o.email?`<div style="font-size:.7rem;color:#7a9490">${o.email}</div>`:""}</td>
      <td><a href="tel:${o.phone}" style="color:#2aab97;font-size:.82rem">${o.phone||"—"}</a></td>
      <td style="max-width:160px;font-size:.76rem;color:#7a9490">${(o.items||"").substring(0,55)}${(o.items||"").length>55?"…":""}</td>
      <td style="font-weight:700;color:#2aab97">₹${o.subtotal||o.total||0}</td>
      <td><span style="font-size:.77rem">${o.payment||"—"}</span></td>
      <td style="font-size:.75rem;color:#7a9490;white-space:nowrap">${date}</td>
      <td>
        <select class="form-select" style="padding:4px 8px;font-size:.74rem;border-radius:7px;min-width:110px" onchange="updateStatus(${realIdx},this.value)">
          ${(isQ?["Quote",...STATUSES]:STATUSES).map(s=>`<option value="${s}" ${s===st?"selected":""}>${s}</option>`).join("")}
        </select>
      </td>
      <td style="white-space:nowrap">
        <button class="btn btn-outline btn-sm" onclick="viewOrder(${realIdx})">View</button>
        <button class="wa-btn" style="padding:5px 8px;margin-left:4px" onclick="waOrder(${realIdx})" title="WhatsApp">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor" xmlns="http://www.w3.org/2000/svg"><path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 01-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 01-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 012.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0012.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 005.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 00-3.48-8.413z"/></svg>
        </button>
      </td>
    </tr>`;
  }).join("");
}

function updateStatus(idx,newStatus){
  orders[idx].status=newStatus;
  OrderSync.saveLocalOrders(orders);
  // Sync status change to Google Sheets via the updateOrder action.
  // BUG FIX: Previously called OrderSync.submit() which (a) is designed for
  // new orders, (b) uses the placeOrder action, and (c) was already saved to
  // localStorage above — making it redundant and semantically wrong.
  const url = (window.DETOXY_CONFIG||{}).sheetsUrl || localStorage.getItem("detoxy_sheets_url");
  if (url) {
    fetch(url, {
      method: "POST",
      mode: "no-cors",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ action: "updateOrder", id: orders[idx].id, updates: { status: newStatus } })
    }).catch(() => { /* silent */ });
  }
  renderOrders();
}

// FIX: proper modal instead of alert()
function viewOrder(idx){
  const o=orders[idx];
  const isQ=o.type==="QUOTE_REQUEST";
  const st=isQ?"Quote":(o.status||"New");
  const badge=BADGE[st]||"badge-new";
  document.getElementById("orderModalBody").innerHTML=`
    <div style="display:flex;align-items:center;gap:10px;margin-bottom:16px;padding-bottom:14px;border-bottom:1px solid #eef2f0">
      <div>
        <div style="font-size:.72rem;font-family:monospace;color:#7a9490">${o.id||"—"}</div>
        <div style="font-size:1rem;font-weight:700;color:#0d1f1b">${o.name||o.company||"—"}</div>
      </div>
      <span class="badge ${badge}" style="margin-left:auto">${st}</span>
    </div>
    <div class="order-detail-row">
      <div class="detail-pair"><b>Phone</b>${o.phone||"—"}</div>
      <div class="detail-pair"><b>Email</b>${o.email||"—"}</div>
      <div class="detail-pair"><b>Payment</b>${o.payment||"—"}</div>
      <div class="detail-pair"><b>Total</b><span style="font-weight:700;color:#2aab97">₹${o.subtotal||o.total||0}</span></div>
      <div class="detail-pair" style="grid-column:1/-1"><b>Delivery Address</b>${o.address||"—"}</div>
      <div class="detail-pair"><b>City</b>${o.city||"—"}</div>
      <div class="detail-pair"><b>State</b>${o.state||"—"}${o.pincode?" — "+o.pincode:""}</div>
      <div class="detail-pair"><b>Order Date</b>${o.savedAt?new Date(o.savedAt).toLocaleString("en-IN"):"—"}</div>
      <div class="detail-pair"><b>Order Type</b>${isQ?"Quote Request":"Purchase Order"}</div>
    </div>
    <div class="items-box"><b style="display:block;font-size:.7rem;text-transform:uppercase;color:#7a9490;margin-bottom:6px">Items Ordered</b>${o.items||"—"}</div>
    ${o.notes?`<div style="font-size:.82rem;color:#4a6660;padding:10px 14px;background:#f8fbfa;border-radius:9px;border:1px solid #eef2f0"><b style="font-size:.7rem;text-transform:uppercase;color:#7a9490;display:block;margin-bottom:3px">Notes / Instructions</b>${o.notes}</div>`:""}`;
  // Wire WA button
  document.getElementById("modalWaBtn").onclick=()=>waOrderByObj(o);
  document.getElementById("orderModal").classList.add("open");
}

function waOrderByObj(o){
  const msg=encodeURIComponent(`*Order Update — Detoxy Hijama*\n\nDear ${o.name||o.company},\nYour Order ID: ${o.id}\nItems: ${o.items}\nTotal: ₹${o.subtotal||o.total||0}\nStatus: ${o.status||"Confirmed"}\n\nThank you for choosing Detoxy Hijama!\nContact: +91 95665 96077`);
  window.open(`https://wa.me/${(o.phone||"").replace(/\D/g,"")}?text=${msg}`,"_blank");
}

function waOrder(idx){waOrderByObj(orders[idx]);}

function exportCSV(){
  const headers=["ID","Name","Phone","Email","Address","City","State","Pincode","Items","Total","Payment","Status","Date"];
  const rows=orders.map(o=>[o.id,o.name||o.company,o.phone,o.email||"",`"${(o.address||"").replace(/"/g,"'")}"`,(o.city||""),(o.state||""),(o.pincode||""),`"${(o.items||"").replace(/"/g,"'")}"`,(o.subtotal||o.total||0),(o.payment||""),(o.status||"New"),(o.savedAt||"")]);
  const csv=[headers,...rows].map(r=>r.join(",")).join("\n");
  const a=document.createElement("a");
  a.href="data:text/csv;charset=utf-8,"+encodeURIComponent(csv);
  a.download="detoxy-orders-"+new Date().toISOString().slice(0,10)+".csv";
  a.click();
}

function clearAllOrders(){
  if(!confirm("Clear ALL orders from local storage? This cannot be undone."))return;
  localStorage.removeItem("detoxy_orders");
  orders=[];
  renderOrders();
}

renderOrders();
</script>
