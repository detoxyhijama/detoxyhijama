    .blog-content h3{font-size:1rem;font-weight:700;color:var(--dark);margin:22px 0 8px}

<div id="footer-mount"></div>
<script src="/assets/js/shared.js"></script>
<script>
var BLOG_ID = 20;

document.addEventListener('DOMContentLoaded', function() {
  var hm = document.getElementById('header-mount');
  if (hm) {
    var frag = document.createRange().createContextualFragment(renderHeader(''));
    hm.replaceWith(frag);
    Cart.updateUI(); initSearch(); initMobileNav(); updateNavAuthLink();
  }
  var fm = document.getElementById('footer-mount');
  if (fm) fm.outerHTML = renderFooter();

  loadBlogContent();
});

function loadBlogContent() {
  var apiUrl = '';
  try { apiUrl = localStorage.getItem('detoxy_sheets_url') || ''; } catch(e) {}

  function renderContent(blog) {
    if (!blog) {
      document.getElementById('blogContent').innerHTML =
        '<p style="color:var(--muted);text-align:center">Article not found. <a href="/blogs.html">Return to Blog</a></p>';
      return;
    }
    // Update page title and meta
    document.title = (blog.title || '') + ' | Detoxy Hijama Blog';
    document.getElementById('blogContent').innerHTML = blog.content ||
      '<p>' + (blog.excerpt || '') + '</p><p style="color:var(--muted)"><em>Full article coming soon.</em></p>';
    // Tags
    var tags = [];
    try { tags = typeof blog.tags === 'string' ? JSON.parse(blog.tags||'[]') : (blog.tags||[]); } catch(e) {}
    if (tags.length) {
      document.getElementById('blogContent').innerHTML +=
        '<div class="blog-tags">' + tags.map(function(t) {
          return '<span class="blog-tag">' + t + '</span>';
        }).join('') + '</div>';
    }
  }

  if (apiUrl) {
    fetch(apiUrl + '?action=getBlog&blogId=builtin-' + BLOG_ID, {redirect:'follow'})
      .then(function(r) { return r.json(); })
      .then(function(d) { renderContent(d.blog || null); })
      .catch(function() { renderContent(null); });
  } else {
    // Fallback: load from blogs.html BLOGS array via postMessage / inline
    renderContent(null);
  }
}
</script>
</body>
