<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>All Hijama Products | Detoxy Hijama — Manufacturer Direct</title>
  <meta name="description" content="Shop all hijama cups, cupping kits, surgical blades, gloves and consumables directly from Detoxy Hijama manufacturer. Bulk pricing available."/>
  <link rel="stylesheet" href="assets/style.css"/>
  <style>
    .filter-bar{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:28px;padding:18px 0;border-bottom:1px solid var(--border)}
    .filter-btn{padding:7px 18px;border-radius:50px;font-size:.8rem;font-weight:600;border:1.5px solid var(--border);background:#fff;color:var(--text);cursor:pointer;transition:all .2s}
    .filter-btn.active,.filter-btn:hover{background:var(--t);color:#fff;border-color:var(--t)}
    .sort-sel{margin-left:auto;padding:7px 14px;border-radius:50px;font-size:.8rem;border:1.5px solid var(--border);color:var(--text);background:#fff;cursor:pointer;outline:none}
    .products-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px;flex-wrap:wrap;gap:8px}
    .result-count{font-size:.83rem;color:var(--muted)}
  </style>
</head>
<body>
<div class="page-wrapper">
  <div id="header-mount"></div>

  <section class="sec">
    <div class="sec-inner">
      <div style="margin-bottom:24px">
        <span class="sec-tag">Full Catalogue</span>
        <h1 class="sec-h2">All <span>Hijama Products</span></h1>
        <p class="sec-sub">Direct from manufacturer — clinic-grade quality, factory direct pricing</p>
      </div>

      <div class="filter-bar">
        <button class="filter-btn active" data-cat="all" onclick="filterProducts('all',this)">All Products</button>
        <button class="filter-btn" data-cat="cups" onclick="filterProducts('cups',this)">Hijama Cups</button>
        <button class="filter-btn" data-cat="kits" onclick="filterProducts('kits',this)">Cupping Kits</button>
        <button class="filter-btn" data-cat="consumables" onclick="filterProducts('consumables',this)">Consumables</button>
        <select class="sort-sel" id="sortSel" onchange="renderProducts()">
          <option value="default">Sort: Featured</option>
          <option value="price-asc">Price: Low to High</option>
          <option value="price-desc">Price: High to Low</option>
          <option value="rating">Top Rated</option>
        </select>
      </div>

      <div class="products-header">
        <span class="result-count" id="resultCount">Loading...</span>
      </div>
      <div class="products-grid" id="productsGrid"></div>
    </div>
  </section>

  <!-- BULK CTA -->
  <div style="background:linear-gradient(135deg,var(--dark),var(--mid));padding:60px 5%;text-align:center;color:#fff">
    <h2 style="font-family:'Cormorant Garamond',serif;font-size:clamp(1.6rem,3vw,2.2rem);font-weight:700;margin-bottom:12px">Need More? Get Wholesale Pricing</h2>
    <p style="opacity:.75;font-size:.93rem;margin-bottom:24px;max-width:480px;margin-left:auto;margin-right:auto">Minimum orders from 50 units. Custom packaging available. Export orders welcome.</p>
    <div style="display:flex;gap:14px;justify-content:center;flex-wrap:wrap">
      <a href="quote.html" class="btn btn--primary">Get Quotation</a>
      <a href="https://wa.me/919566596077" class="btn btn--outline-white" target="_blank">💬 WhatsApp</a>
    </div>
  </div>

  <div id="footer-mount"></div>
</div>
<script src="config.js"></script>
<script src="shared.js"></script>
<script>
  document.getElementById('header-mount').innerHTML = getNavHTML('Products');
  document.getElementById('footer-mount').innerHTML = getFooterHTML();

  let _cat = 'all';
  const prods = (window.DETOXY_CONFIG || {}).products || [];

  // Handle URL param
  const urlCat = new URLSearchParams(window.location.search).get('cat');
  if (urlCat) {
    _cat = urlCat;
    document.querySelectorAll('.filter-btn').forEach(b => {
      b.classList.toggle('active', b.dataset.cat === _cat);
    });
  }

  function filterProducts(cat, btn) {
    _cat = cat;
    document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
    if (btn) btn.classList.add('active');
    renderProducts();
  }

  function renderProducts() {
    let list = _cat === 'all' ? [...prods] : prods.filter(p => p.category === _cat);
    const sort = document.getElementById('sortSel').value;
    if (sort === 'price-asc') list.sort((a,b) => a.price - b.price);
    else if (sort === 'price-desc') list.sort((a,b) => b.price - a.price);
    else if (sort === 'rating') list.sort((a,b) => b.rating - a.rating);
    document.getElementById('resultCount').textContent = `Showing ${list.length} products`;
    document.getElementById('productsGrid').innerHTML = list.map(p => getProductCardHTML(p, '')).join('');
  }

  renderProducts();
</script>
</body>
</html>
