<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1"/>
  <title>Shipper View | Detoxy Hijama</title>
  <meta name="robots" content="noindex,nofollow"/>
  <style>
    *{box-sizing:border-box;margin:0;padding:0}
    body{background:#eef2f0;font-family:"Outfit",system-ui,sans-serif;color:#0d1f1b;min-height:100vh}
    @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700&family=Cormorant+Garamond:wght@700&display=swap');

    /* ── Top bar ── */
    .topbar{background:#0d1f1b;padding:14px 24px;display:flex;align-items:center;justify-content:space-between;gap:12px;flex-wrap:wrap}
    .topbar-brand{display:flex;align-items:center;gap:10px;color:#fff}
    .topbar-brand-name{font-family:"Cormorant Garamond",serif;font-size:1.15rem;font-weight:700}
    .topbar-brand-sub{font-size:.6rem;color:rgba(255,255,255,.35);text-transform:uppercase;letter-spacing:.12em}
    .topbar-right{display:flex;align-items:center;gap:10px}

    /* ── Layout ── */
    .page{max-width:1100px;margin:0 auto;padding:28px 20px}
    .page-header{margin-bottom:24px}
    .page-title{font-family:"Cormorant Garamond",serif;font-size:1.8rem;font-weight:700;color:#0d1f1b}
    .page-sub{font-size:.82rem;color:#7a9490;margin-top:3px}

    /* ── Filter bar ── */
    .filter-bar{display:flex;gap:10px;margin-bottom:18px;flex-wrap:wrap;align-items:center;background:#fff;border-radius:14px;padding:14px 16px;border:1px solid #dde8e5}
    .filter-bar input, .filter-bar select{padding:8px 12px;border:1.5px solid #d1ddd9;border-radius:9px;font-size:.82rem;font-family:inherit;color:#0d1f1b;background:#fff;transition:border-color .18s}
    .filter-bar input:focus,.filter-bar select:focus{outline:none;border-color:#2aab97}
    .filter-count{font-size:.78rem;color:#7a9490;font-weight:600;margin-left:auto}

    /* ── Cards grid ── */
    .cards-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(320px,1fr));gap:16px}
    .order-card{background:#fff;border-radius:16px;border:1px solid #dde8e5;box-shadow:0 1px 4px rgba(13,31,27,.04);overflow:hidden;transition:box-shadow .18s}
    .order-card:hover{box-shadow:0 4px 18px rgba(13,31,27,.1)}

    /* Card header */
    .card-head{padding:14px 16px 10px;display:flex;align-items:flex-start;justify-content:space-between;gap:8px;border-bottom:1px solid #eef2f0}
    .card-id{font-size:.68rem;font-family:monospace;color:#7a9490}
    .card-name{font-size:.95rem;font-weight:700;color:#0d1f1b;margin-top:2px}
    .card-date{font-size:.7rem;color:#7a9490;white-space:nowrap;margin-top:2px}

    /* Badge */
    .badge{display:inline-flex;align-items:center;gap:3px;padding:3px 9px;border-radius:50px;font-size:.65rem;font-weight:700;white-space:nowrap;flex-shrink:0}
    .badge-new{background:#dcfce7;color:#166534}
    .badge-processing{background:#fef9c3;color:#854d0e}
    .badge-shipped{background:#dbeafe;color:#1e40af}
    .badge-delivered{background:#d1fae5;color:#065f46}
    .badge-quote{background:#ede9fe;color:#5b21b6}
    .badge-cancelled{background:#fee2e2;color:#991b1b}

    /* Card body */
    .card-body{padding:12px 16px}
    .info-row{display:flex;gap:8px;margin-bottom:7px;align-items:flex-start}
    .info-icon{width:18px;flex-shrink:0;opacity:.5;margin-top:1px}
    .info-text{font-size:.81rem;color:#1a3530;line-height:1.5}
    .info-label{font-size:.68rem;text-transform:uppercase;color:#7a9490;font-weight:700;margin-bottom:1px}
    .items-text{font-size:.78rem;color:#4a6660;line-height:1.55;background:#f8fbfa;border-radius:8px;padding:8px 10px;border:1px solid #eef2f0;margin-bottom:10px}

    /* Card footer */
    .card-foot{padding:10px 16px 14px;display:flex;align-items:center;justify-content:space-between;gap:8px;flex-wrap:wrap}
    .total-chip{background:#eef2f0;border-radius:8px;padding:5px 10px;font-size:.84rem;font-weight:700;color:#0d1f1b}
    .total-chip span{color:#2aab97}

    /* Buttons */
    .btn{display:inline-flex;align-items:center;gap:5px;padding:8px 14px;border-radius:9px;font-size:.78rem;font-weight:600;cursor:pointer;border:none;font-family:inherit;transition:all .18s;text-decoration:none}
    .btn-wa{background:#25d366;color:#fff}
    .btn-wa:hover{background:#1fba59}
    .btn-copy{background:#eef2f0;color:#0d1f1b;border:1px solid #d1ddd9}
    .btn-copy:hover{background:#e2ecea}

    /* Status selector */
    .status-select{padding:5px 8px;border:1.5px solid #d1ddd9;border-radius:8px;font-size:.74rem;font-family:inherit;color:#0d1f1b;background:#fff;cursor:pointer}
    .status-select:focus{outline:none;border-color:#2aab97}

    /* Empty state */
    .empty{text-align:center;padding:64px 20px;color:#7a9490}
    .empty svg{margin-bottom:12px;opacity:.3}
    .empty h3{font-size:1rem;margin-bottom:4px}

    /* Toast */
    .toast{position:fixed;bottom:24px;right:24px;background:#0d1f1b;color:#fff;padding:10px 18px;border-radius:12px;font-size:.82rem;font-weight:500;opacity:0;transform:translateY(10px);transition:all .25s;z-index:9999;pointer-events:none}
    .toast.show{opacity:1;transform:translateY(0)}

    /* Stats row */
    .stats-row{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:24px}
    .stat-chip{background:#fff;border-radius:12px;padding:14px 16px;border:1px solid #dde8e5;text-align:center}
    .stat-val{font-family:"Cormorant Garamond",serif;font-size:1.7rem;font-weight:700;color:#0d1f1b}
    .stat-lbl{font-size:.68rem;color:#7a9490;font-weight:600;text-transform:uppercase;letter-spacing:.06em;margin-top:2px}

    @media(max-width:640px){.stats-row{grid-template-columns:repeat(2,1fr)}.cards-grid{grid-template-columns:1fr}}
  </style>
</head>
<body>

<div class="topbar">
  <div class="topbar-brand">
    <div>
      <div class="topbar-brand-name">Detoxy Hijama</div>
      <div class="topbar-brand-sub">Shipper / Dispatch View</div>
    </div>
  </div>
  <div class="topbar-right">
    <span id="lastRefresh" style="font-size:.72rem;color:rgba(255,255,255,.4)"></span>
    <button class="btn btn-copy" onclick="loadOrders()" style="padding:7px 13px;font-size:.74rem">
      <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="23 4 23 10 17 10"/><path d="M20.49 15a9 9 0 11-2.12-9.36L23 10"/></svg>
      Refresh
    </button>
    <a href="../admin/orders.html" class="btn btn-copy" style="padding:7px 13px;font-size:.74rem">
      <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/></svg>
      Admin
    </a>
  </div>
</div>

<div class="page">
  <div class="page-header">
    <div class="page-title">Dispatch Board</div>
    <div class="page-sub">Showing orders ready for packing &amp; shipping — updated in real time from localStorage</div>
  </div>

  <!-- Stats -->
  <div class="stats-row" id="statsRow"></div>

  <!-- Filters -->
  <div class="filter-bar">
    <input id="searchInput" placeholder="Search name, phone, order ID…" oninput="render()" style="min-width:200px;flex:1"/>
    <select id="statusFilter" onchange="render()">
      <option value="">All Statuses</option>
      <option value="New" selected>New</option>
      <option value="Processing">Processing</option>
      <option value="Shipped">Shipped</option>
      <option value="Delivered">Delivered</option>
    </select>
    <select id="sortBy" onchange="render()">
      <option value="newest">Newest First</option>
      <option value="oldest">Oldest First</option>
      <option value="total_high">Highest Value</option>
    </select>
    <span class="filter-count" id="countLabel"></span>
  </div>

  <!-- Cards -->
  <div class="cards-grid" id="cardsGrid"></div>
</div>

<div class="toast" id="toast"></div>

<script src="../config.js"></script>
<script src="../shared.js"></script>
<script>
let allOrders = [];

const BADGE = {
  New:"badge-new",Processing:"badge-processing",Shipped:"badge-shipped",
  Delivered:"badge-delivered",Quote:"badge-quote",Cancelled:"badge-cancelled"
};
const STATUSES = ["New","Processing","Shipped","Delivered","Cancelled"];

function loadOrders() {
  allOrders = OrderSync.getLocalOrders();
  updateStats();
  render();
  document.getElementById("lastRefresh").textContent =
    "Refreshed " + new Date().toLocaleTimeString("en-IN");
}

function updateStats() {
  const total = allOrders.filter(o => o.status !== "Cancelled" && o.type !== "QUOTE_REQUEST");
  const newC   = total.filter(o => !o.status || o.status === "New").length;
  const proc   = total.filter(o => o.status === "Processing").length;
  const ship   = total.filter(o => o.status === "Shipped").length;
  const done   = total.filter(o => o.status === "Delivered").length;
  document.getElementById("statsRow").innerHTML = [
    [newC,   "New",       "#dcfce7","#166534"],
    [proc,   "Processing","#fef9c3","#854d0e"],
    [ship,   "Shipped",   "#dbeafe","#1e40af"],
    [done,   "Delivered", "#d1fae5","#065f46"],
  ].map(([v,l,bg,fg])=>`
    <div class="stat-chip" style="border-top:3px solid ${fg}">
      <div class="stat-val">${v}</div>
      <div class="stat-lbl" style="color:${fg}">${l}</div>
    </div>`).join("");
}

function render() {
  const q  = (document.getElementById("searchInput").value || "").toLowerCase();
  const sf = document.getElementById("statusFilter").value;
  const sb = document.getElementById("sortBy").value;

  let list = allOrders.filter(o => {
    if (o.type === "QUOTE_REQUEST") return false;
    if (o.status === "Cancelled")   return false;
    const mQ = !q || (o.name||"").toLowerCase().includes(q)
                  || (o.phone||"").includes(q)
                  || (o.id||"").toLowerCase().includes(q)
                  || (o.city||"").toLowerCase().includes(q);
    const mS = !sf || (o.status||"New") === sf;
    return mQ && mS;
  });

  // Sort
  if (sb === "oldest")     list.sort((a,b)=>(a.savedAt||0)-(b.savedAt||0));
  else if (sb === "total_high") list.sort((a,b)=>parseFloat(b.subtotal||b.total||0)-parseFloat(a.subtotal||a.total||0));
  else list.sort((a,b)=>(b.savedAt||0)-(a.savedAt||0));

  document.getElementById("countLabel").textContent = list.length + " order" + (list.length!==1?"s":"");

  const grid = document.getElementById("cardsGrid");
  if (!list.length) {
    grid.innerHTML = `<div class="empty" style="grid-column:1/-1">
      <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
        <path d="M6 2L3 6v14a2 2 0 002 2h14a2 2 0 002-2V6l-3-4z"/>
        <line x1="3" y1="6" x2="21" y2="6"/>
      </svg>
      <h3>No orders match</h3>
      <p style="font-size:.8rem">Try adjusting your filters.</p>
    </div>`;
    return;
  }

  grid.innerHTML = list.map(o => {
    const st   = o.status || "New";
    const badge= BADGE[st] || "badge-new";
    const date = o.savedAt ? new Date(o.savedAt).toLocaleDateString("en-IN",{day:"2-digit",month:"short",year:"2-digit"}) : "—";
    const addr = [o.address, o.city, o.state, o.pincode].filter(Boolean).join(", ");
    const realIdx = allOrders.indexOf(o);

    return `<div class="order-card">
      <div class="card-head">
        <div>
          <div class="card-id">${o.id||"—"}</div>
          <div class="card-name">${o.name||o.company||"—"}</div>
          <div class="card-date">📅 ${date} &nbsp;·&nbsp; ${o.payment||"—"}</div>
        </div>
        <span class="badge ${badge}">${st}</span>
      </div>

      <div class="card-body">
        <!-- Address -->
        <div class="info-row">
          <svg class="info-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8">
            <path d="M21 10c0 7-9 13-9 13S3 17 3 10a9 9 0 0118 0z"/><circle cx="12" cy="10" r="3"/>
          </svg>
          <div>
            <div class="info-label">Delivery Address</div>
            <div class="info-text">${addr||"—"}</div>
          </div>
        </div>

        <!-- Phone -->
        <div class="info-row">
          <svg class="info-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8">
            <path d="M22 16.92v3a2 2 0 01-2.18 2 19.79 19.79 0 01-8.63-3.07A19.5 19.5 0 013.07 9.81 19.79 19.79 0 012 1.23 2 2 0 013.11 .18h3a2 2 0 012 1.72c.127.96.361 1.903.7 2.81a2 2 0 01-.45 2.11L7.09 7.91a16 16 0 006 6l1.27-1.27a2 2 0 012.11-.45c.907.339 1.85.573 2.81.7A2 2 0 0122 14.92z"/>
          </svg>
          <div>
            <div class="info-label">Phone</div>
            <div class="info-text"><a href="tel:${o.phone||""}" style="color:#2aab97;font-weight:600">${o.phone||"—"}</a></div>
          </div>
        </div>

        <!-- Items -->
        <div class="items-text">
          <div style="font-size:.67rem;text-transform:uppercase;color:#7a9490;font-weight:700;margin-bottom:4px">📦 Items Ordered</div>
          ${o.items||"—"}
        </div>

        ${o.notes ? `<div class="items-text" style="background:#fffbeb;border-color:#fef08a">
          <div style="font-size:.67rem;text-transform:uppercase;color:#92400e;font-weight:700;margin-bottom:3px">📝 Note</div>
          ${o.notes}
        </div>` : ""}
      </div>

      <div class="card-foot">
        <div class="total-chip">Total: <span>₹${o.subtotal||o.total||0}</span></div>
        <div style="display:flex;gap:7px;align-items:center">
          <select class="status-select" onchange="updateStatus(${realIdx},this.value)">
            ${STATUSES.map(s=>`<option value="${s}" ${s===st?"selected":""}>${s}</option>`).join("")}
          </select>
          <button class="btn btn-copy" onclick="copyAddress('${encodeURIComponent(addr)}')" title="Copy address">
            <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 01-2-2V4a2 2 0 012-2h9a2 2 0 012 2v1"/></svg>
          </button>
          <button class="btn btn-wa" onclick="sendWhatsApp(${realIdx})" title="WhatsApp customer">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor"><path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 01-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 01-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 012.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0012.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 005.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 00-3.48-8.413z"/></svg>
          </button>
        </div>
      </div>
    </div>`;
  }).join("");
}

function updateStatus(idx, newStatus) {
  allOrders[idx].status = newStatus;
  OrderSync.saveLocalOrders(allOrders);
  updateStats();
  render();
  showToast("Status updated → " + newStatus);
}

function sendWhatsApp(idx) {
  const o = allOrders[idx];
  const addr = [o.address, o.city, o.state, o.pincode].filter(Boolean).join(", ");
  const msg = encodeURIComponent(
    `*Order Dispatch — Detoxy Hijama*\n\n` +
    `Dear ${o.name||o.company},\n` +
    `Your Order ID: ${o.id}\n` +
    `Items: ${o.items}\n` +
    `Total: ₹${o.subtotal||o.total||0}\n` +
    `Status: ${o.status||"Confirmed"}\n` +
    `Delivery to: ${addr}\n\n` +
    `Thank you for choosing Detoxy Hijama!\n📞 +91 95665 96077`
  );
  window.open(`https://wa.me/${(o.phone||"").replace(/\D/g,"")}?text=${msg}`, "_blank");
}

function copyAddress(encodedAddr) {
  navigator.clipboard.writeText(decodeURIComponent(encodedAddr))
    .then(() => showToast("Address copied!"))
    .catch(() => showToast("Copy failed"));
}

function showToast(msg) {
  const t = document.getElementById("toast");
  t.textContent = msg;
  t.classList.add("show");
  setTimeout(() => t.classList.remove("show"), 2200);
}

// Auto-refresh every 60 seconds
loadOrders();
setInterval(loadOrders, 60000);
</script>
</body>
</html>
