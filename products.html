<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>All Hijama Products | Detoxy Hijama — Buy Cupping Sets Online India</title>
  <meta name="description" content="Browse our complete range of hijama cups, cupping kits, electric devices, lancet pens, gloves and consumables. Factory direct prices. Pan India delivery."/>
  <meta name="robots" content="index, follow"/>
  <link rel="canonical" href="https://detoxyhijama.github.io/products.html"/>
  <meta property="og:title" content="All Hijama Products | Detoxy Hijama"/>
  <meta property="og:description" content="Shop hijama cups, cupping kits and consumables direct from the manufacturer."/>
  <meta property="og:type" content="website"/>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;0,700;1,400;1,600&family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="assets/style.css"/>
  <style>
    .products-page{display:grid;grid-template-columns:240px 1fr;gap:32px;padding:40px 0 80px}
    .filter-sidebar{position:sticky;top:calc(var(--nav-h) + 20px);height:fit-content}
    .filter-card{background:var(--white);border:1px solid var(--border);border-radius:var(--radius);padding:24px}
    .filter-title{font-weight:700;font-size:.88rem;color:var(--dark);margin-bottom:16px;padding-bottom:10px;border-bottom:1px solid var(--border)}
    .filter-group{margin-bottom:24px}
    .filter-group:last-child{margin-bottom:0}
    .filter-label{font-size:.8rem;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:.07em;margin-bottom:10px;display:block}
    .filter-option{display:flex;align-items:center;gap:9px;padding:6px 0;cursor:pointer;font-size:.85rem;color:var(--text);transition:var(--transition)}
    .filter-option:hover{color:var(--t)}
    .filter-option input{accent-color:var(--t);width:15px;height:15px;cursor:pointer}
    .filter-option.active{color:var(--t);font-weight:600}
    .filter-count{font-size:.72rem;color:var(--muted);margin-left:auto}
    .price-range{display:flex;gap:8px;align-items:center}
    .price-input{width:80px;padding:7px 10px;border:1.5px solid var(--border);border-radius:6px;font-size:.82rem;outline:none}
    .price-input:focus{border-color:var(--t)}

    .products-main{}
    .products-toolbar{display:flex;justify-content:space-between;align-items:center;gap:12px;flex-wrap:wrap;margin-bottom:24px;padding-bottom:16px;border-bottom:1px solid var(--border)}
    .products-count{font-size:.88rem;color:var(--muted)}
    .products-count strong{color:var(--dark)}
    .sort-select{padding:8px 12px;border:1.5px solid var(--border);border-radius:7px;font-size:.85rem;background:var(--white);color:var(--dark);outline:none;cursor:pointer;font-family:var(--font-sans)}
    .sort-select:focus{border-color:var(--t)}

    .active-filters{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:16px}
    .filter-tag{display:inline-flex;align-items:center;gap:5px;padding:4px 10px;background:var(--tp);color:var(--td);font-size:.75rem;font-weight:600;border-radius:50px;cursor:pointer;border:1px solid var(--tp2)}
    .filter-tag svg{width:13px;height:13px}

    @media(max-width:900px){
      .products-page{grid-template-columns:1fr}
      .filter-sidebar{display:none}
      .filter-sidebar.open{display:block;position:fixed;top:0;right:0;bottom:0;left:0;z-index:200;background:var(--white);overflow-y:auto;padding:20px 20px 80px}
    }
    .filter-sidebar-close{display:none;width:100%;padding:12px;background:var(--dark);color:#fff;border:none;border-radius:var(--radius-sm);font-size:.9rem;font-weight:600;cursor:pointer;margin-bottom:16px;font-family:var(--font-sans)}
    @media(max-width:900px){.filter-sidebar.open .filter-sidebar-close{display:block}}
    /* Dim overlay behind open filter */
    .filter-overlay{display:none;position:fixed;top:0;right:0;bottom:0;left:0;background:rgba(0,0,0,.4);z-index:199}
    .filter-overlay.show{display:block}
    .mobile-filter-btn{display:none}
    @media(max-width:900px){.mobile-filter-btn{display:flex}}
  </style>
  <link rel="icon" type="image/png" href="/assets/images/favicon.png"/>
  <link rel="apple-touch-icon" href="/assets/images/logo-192.png"/>
</head>
<body>
<div id="header-mount" data-page="All Products"></div>

<section class="page-hero">
  <div class="container">
    <nav class="breadcrumb" aria-label="Breadcrumb">
      <a href="/index.html">Home</a>
      <svg fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><polyline points="9 18 15 12 9 6"/></svg>
      <span aria-current="page">All Products</span>
    </nav>
    <h1>Hijama Equipment &amp; Cupping Supplies</h1>
    <p>Factory-direct pricing on clinical-grade hijama products. Free shipping above &#8377;999.</p>
  </div>
</section>

<div class="container">
  <div class="products-page">
    <!-- FILTER SIDEBAR -->
    <aside class="filter-sidebar" id="filterSidebar" aria-label="Product filters">
      <button class="filter-sidebar-close" onclick="closeFilterSidebar()">✕ Close Filters</button>
      <div class="filter-card">
        <div class="filter-title" style="display:flex;justify-content:space-between;align-items:center">
          Filters
          <button onclick="clearAllFilters()" style="font-size:.75rem;color:var(--t);background:none;border:none;cursor:pointer;font-weight:600">Clear All</button>
        </div>

        <div class="filter-group">
          <span class="filter-label">Category</span>
          <label class="filter-option"><input type="checkbox" value="cups" onchange="applyFilters()"> Cupping Sets <span class="filter-count">5</span></label>
          <label class="filter-option"><input type="checkbox" value="kits" onchange="applyFilters()"> Starter Kits <span class="filter-count">2</span></label>
          <label class="filter-option"><input type="checkbox" value="electric" onchange="applyFilters()"> Electric Devices <span class="filter-count">1</span></label>
          <label class="filter-option"><input type="checkbox" value="consumables" onchange="applyFilters()"> Consumables <span class="filter-count">3</span></label>
          <label class="filter-option"><input type="checkbox" value="facial" onchange="applyFilters()"> Facial Cups <span class="filter-count">2</span></label>
        </div>

        <div class="filter-group">
          <span class="filter-label">Price Range</span>
          <div class="price-range">
            <input type="number" id="priceMin" class="price-input" placeholder="Min" min="0" onchange="applyFilters()"/>
            <span style="color:var(--muted);font-size:.8rem">to</span>
            <input type="number" id="priceMax" class="price-input" placeholder="Max" min="0" onchange="applyFilters()"/>
          </div>
        </div>

        <div class="filter-group">
          <span class="filter-label">Rating</span>
          <label class="filter-option"><input type="radio" name="rating" value="4.5" onchange="applyFilters()"> 4.5 &amp; above</label>
          <label class="filter-option"><input type="radio" name="rating" value="4" onchange="applyFilters()"> 4.0 &amp; above</label>
          <label class="filter-option"><input type="radio" name="rating" value="" onchange="applyFilters()"> All ratings</label>
        </div>

        <div class="filter-group">
          <span class="filter-label">Availability</span>
          <label class="filter-option"><input type="checkbox" id="inStockOnly" onchange="applyFilters()"> In Stock Only</label>
        </div>
      </div>
    </aside>

    <!-- PRODUCTS MAIN -->
    <div class="filter-overlay" id="filterOverlay" onclick="closeFilterSidebar()"></div>
    <main id="productsMain">
      <div class="products-toolbar">
        <div>
          <div class="active-filters" id="activeFilters"></div>
          <p class="products-count"><strong id="productCount">0</strong> products found</p>
        </div>
        <div style="display:flex;gap:10px;align-items:center">
          <button class="btn btn-outline btn-sm mobile-filter-btn" onclick="openFilterSidebar()">
            <svg width="15" height="15" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><line x1="4" y1="6" x2="20" y2="6"/><line x1="4" y1="12" x2="14" y2="12"/><line x1="4" y1="18" x2="10" y2="18"/></svg>
            Filters
          </button>
          <select class="sort-select" id="sortSelect" onchange="applyFilters()" aria-label="Sort products">
            <option value="default">Sort: Default</option>
            <option value="price-asc">Price: Low to High</option>
            <option value="price-desc">Price: High to Low</option>
            <option value="rating">Best Rated</option>
            <option value="popular">Most Popular</option>
          </select>
        </div>
      </div>

      <div class="products-grid" id="productsGrid" aria-live="polite" aria-label="Products">
        <!-- Loaded by JS -->
      </div>

      <div class="empty-state" id="emptyState" style="display:none">
        <div class="empty-state-icon"><svg fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.5"><path stroke-linecap="round" stroke-linejoin="round" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"/></svg></div>
        <h3>No products found</h3>
        <p>Try adjusting your filters or search query</p>
        <button onclick="clearAllFilters()" class="btn btn-primary">Clear Filters</button>
      </div>
    </main>
  </div>
</div>

<div id="footer-mount"></div>
<script src="assets/js/shared.js"></script>
<script>
document.addEventListener('DOMContentLoaded', function() {
  var hm = document.getElementById('header-mount');
  if (hm) {
    var frag = document.createRange().createContextualFragment(renderHeader('All Products'));
    hm.replaceWith(frag);
    Cart.updateUI();
    initSearch();
    initMobileNav();
  }
  var fm = document.getElementById('footer-mount');
  if (fm) fm.outerHTML = renderFooter();

  // Handle URL params
  var params = new URLSearchParams(window.location.search);
  var cat = params.get('cat');
  var q = params.get('q');

  if (cat) {
    var cb = document.querySelector('input[value="'+cat+'"]');
    if (cb) cb.checked = true;
  }
  if (q) {
    var si = document.getElementById('navSearch');
    if (si) si.value = q;
  }

  applyFilters();
});

function applyFilters() {
  var cats = Array.from(document.querySelectorAll('.filter-sidebar input[type="checkbox"][value]'))
    .filter(function(c){ return c.checked; }).map(function(c){ return c.value; });
  var minPrice = parseFloat(document.getElementById('priceMin').value) || 0;
  var maxPrice = parseFloat(document.getElementById('priceMax').value) || Infinity;
  var ratingEl = document.querySelector('input[name="rating"]:checked');
  var minRating = ratingEl ? parseFloat(ratingEl.value) || 0 : 0;
  var inStock = document.getElementById('inStockOnly').checked;
  var sort = document.getElementById('sortSelect').value;
  var q = (document.getElementById('navSearch') || {}).value || '';
  q = (new URLSearchParams(window.location.search).get('q') || q).toLowerCase().trim();

  var results = PRODUCTS.filter(function(p) {
    if (cats.length && !cats.includes(p.category)) return false;
    if (p.price < minPrice || p.price > maxPrice) return false;
    if (p.rating < minRating) return false;
    if (inStock && p.stock <= 0) return false;
    if (q && !p.name.toLowerCase().includes(q) && !p.categoryLabel.toLowerCase().includes(q) && !p.shortDesc.toLowerCase().includes(q)) return false;
    return true;
  });

  // Sort
  if (sort === 'price-asc') results.sort(function(a,b){ return a.price - b.price; });
  else if (sort === 'price-desc') results.sort(function(a,b){ return b.price - a.price; });
  else if (sort === 'rating') results.sort(function(a,b){ return b.rating - a.rating; });
  else if (sort === 'popular') results.sort(function(a,b){ return b.reviews - a.reviews; });

  var grid = document.getElementById('productsGrid');
  var empty = document.getElementById('emptyState');
  document.getElementById('productCount').textContent = results.length;

  if (results.length === 0) {
    grid.style.display = 'none';
    empty.style.display = 'block';
  } else {
    grid.style.display = 'grid';
    empty.style.display = 'none';
    grid.innerHTML = results.map(function(p){ return renderProductCard(p); }).join('');
  }

  // Active filters display
  var tags = [];
  cats.forEach(function(c){ tags.push('<div class="filter-tag" onclick="removeCatFilter(\''+c+'\')">'+c+' <svg fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M6 18L18 6M6 6l12 12"/></svg></div>'); });
  document.getElementById('activeFilters').innerHTML = tags.join('');
}

function removeCatFilter(cat) {
  var cb = document.querySelector('input[value="'+cat+'"]');
  if (cb) { cb.checked = false; applyFilters(); }
}

function clearAllFilters() {
  document.querySelectorAll('.filter-sidebar input').forEach(function(i){ i.checked = false; i.value = ''; });
  applyFilters();
}

function openFilterSidebar() {
  document.getElementById('filterSidebar').classList.add('open');
  document.getElementById('filterOverlay').classList.add('show');
  document.body.style.overflow = 'hidden';
}

function closeFilterSidebar() {
  document.getElementById('filterSidebar').classList.remove('open');
  document.getElementById('filterOverlay').classList.remove('show');
  document.body.style.overflow = '';
}
</script>
</body>
</html>
