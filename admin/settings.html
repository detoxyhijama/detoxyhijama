<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Settings | Detoxy Hijama Admin</title>
  <meta name="robots" content="noindex,nofollow"/>
  <link rel="stylesheet" href="../assets/style.css"/>
  <style>
    body{background:#f0f4f3}
    .admin-wrap{display:grid;grid-template-columns:240px 1fr;min-height:100vh}
    .admin-sidebar{background:#0d1f1b;padding:24px 16px;position:fixed;width:240px;height:100vh;overflow-y:auto;z-index:100}
    .admin-main{margin-left:248px;padding:28px}
    .sidebar-brand{display:flex;align-items:center;gap:10px;padding:0 8px 20px;margin-bottom:12px;border-bottom:1px solid rgba(255,255,255,.08)}
    .sidebar-brand-text{font-family:'Cormorant Garamond',serif;font-size:1rem;color:#fff;font-weight:700}
    .sidebar-label{font-size:.65rem;color:rgba(255,255,255,.3);text-transform:uppercase;letter-spacing:.12em;font-weight:700;padding:14px 12px 6px}
    .sidebar-link{display:flex;align-items:center;gap:10px;padding:10px 12px;border-radius:10px;color:rgba(255,255,255,.65);font-size:.83rem;font-weight:500;transition:all .2s;margin-bottom:2px;text-decoration:none}
    .sidebar-link:hover,.sidebar-link.active{background:rgba(42,171,151,.16);color:#5eead4}
    .set-card{background:#fff;border-radius:16px;padding:28px;border:1px solid var(--border);margin-bottom:20px}
    .set-card h2{font-family:'Cormorant Garamond',serif;font-size:1.2rem;font-weight:700;color:var(--dark);margin-bottom:18px;padding-bottom:12px;border-bottom:1px solid var(--border)}
    @media(max-width:900px){.admin-wrap{grid-template-columns:1fr}.admin-sidebar{display:none}.admin-main{margin-left:0}}
  </style>
</head>

  <main class="admin-main">
    <div style="margin-bottom:24px">
      <h1 style="font-family:'Cormorant Garamond',serif;font-size:1.8rem;font-weight:700;color:var(--dark)">Settings</h1>
      <p style="font-size:.83rem;color:var(--muted)">Admin panel configuration and security settings.</p>
    </div>
    <div id="setAlert"></div>

    <div class="set-card">
      <h2>🔐 Change Admin Password</h2>
      <div class="form-group"><label class="form-label">Current Password</label><input type="password" class="form-input" id="oldPass" placeholder="Enter current password"/></div>
      <div class="form-group"><label class="form-label">New Password</label><input type="password" class="form-input" id="newPass" placeholder="Enter new password (min 8 chars)"/></div>
      <div class="form-group"><label class="form-label">Confirm New Password</label><input type="password" class="form-input" id="confirmPass" placeholder="Repeat new password"/></div>
      <button class="btn btn--primary" onclick="changePassword()">Update Password</button>
    </div>

    <div class="set-card">
      <h2>🛒 Shop Settings</h2>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:14px">
        <div class="form-group"><label class="form-label">Free Shipping Threshold (₹)</label><input type="number" class="form-input" id="freeShipAt" value="999"/></div>
        <div class="form-group"><label class="form-label">Default Shipping Cost (₹)</label><input type="number" class="form-input" id="defaultShip" value="60"/></div>
        <div class="form-group"><label class="form-label">COD Available</label>
          <select class="form-select" id="codEnabled"><option value="yes">Yes</option><option value="no">No</option></select></div>
        <div class="form-group"><label class="form-label">Max COD Order Value (₹)</label><input type="number" class="form-input" id="codMax" value="5000"/></div>
      </div>
      <button class="btn btn--primary" onclick="saveSettings()">Save Settings</button>
    </div>

    <div class="set-card">
      <h2>⚠️ Danger Zone</h2>
      <div style="display:flex;gap:12px;flex-wrap:wrap">
        <button class="btn" style="background:var(--red);color:#fff;border-radius:10px" onclick="if(confirm('Clear ALL localStorage data? This removes all orders, blog drafts, and settings.'))localStorage.clear();">🗑️ Clear All Data</button>
        <button class="btn btn--outline" onclick="exportData()">⬇️ Export All Data (JSON)</button>
      </div>
    </div>
  </main>
</div>
<script src="../config.js"></script>
<script src="../shared.js"></script>
<script>
if (sessionStorage.getItem('detoxy_admin') !== 'true') window.location.href = 'login.html';

function changePassword() {
  const old = document.getElementById('oldPass').value;
  const n = document.getElementById('newPass').value;
  const c = document.getElementById('confirmPass').value;
  // Check localStorage override first, then config default
  const correct = localStorage.getItem('detoxy_admin_pass') || (window.DETOXY_CONFIG||{}).adminPassword || 'detoxy2024admin';
  const al = document.getElementById('setAlert');
  if (old !== correct) { al.innerHTML='<div class="alert alert--error">Current password is incorrect.</div>'; return; }
  if (n.length < 8) { al.innerHTML='<div class="alert alert--error">New password must be at least 8 characters.</div>'; return; }
  if (n !== c) { al.innerHTML='<div class="alert alert--error">New passwords do not match.</div>'; return; }
  localStorage.setItem('detoxy_admin_pass', n);
  al.innerHTML='<div class="alert alert--success">✅ Password updated successfully!</div>';
}

function saveSettings() {
  localStorage.setItem('shop_freeShipAt', document.getElementById('freeShipAt').value);
  localStorage.setItem('shop_defaultShip', document.getElementById('defaultShip').value);
  localStorage.setItem('shop_codEnabled', document.getElementById('codEnabled').value);
  localStorage.setItem('shop_codMax', document.getElementById('codMax').value);
  document.getElementById('setAlert').innerHTML='<div class="alert alert--success">✅ Shop settings saved!</div>';
  setTimeout(()=>document.getElementById('setAlert').innerHTML='',3000);
}

function exportData() {
  const data = {};
  for (let i=0;i<localStorage.length;i++){const k=localStorage.key(i);data[k]=localStorage.getItem(k);}
  const a=document.createElement('a');
  a.href='data:application/json;charset=utf-8,'+encodeURIComponent(JSON.stringify(data,null,2));
  a.download='detoxy-admin-backup-'+new Date().toISOString().slice(0,10)+'.json';
  a.click();
}
</script>
