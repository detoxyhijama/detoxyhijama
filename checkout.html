<!DOCTYPE html>
<html lang="en">
<head>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,600;0,700;1,400&family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Checkout | Detoxy Hijama</title>
  <meta name="robots" content="noindex, nofollow"/>
  <link rel="stylesheet" href="assets/style.css"/>
  <style>
    .step-bar{display:flex;align-items:center;gap:0;margin-bottom:32px}
    .step{display:flex;align-items:center;gap:8px;font-size:.82rem;font-weight:600;color:var(--muted)}
    .step.active{color:var(--t)}
    .step.done{color:var(--green)}
    .step-num{width:26px;height:26px;border-radius:50%;border:2px solid currentColor;display:flex;align-items:center;justify-content:center;font-size:.72rem;font-weight:800}
    .step-sep{flex:1;height:1px;background:var(--border);margin:0 12px}
  </style>
</head>
<body>
<div class="page-wrapper">
  <div id="header-mount"></div>

  <section style="background:var(--cream);padding:24px 0;border-bottom:1px solid var(--border)">
    <div class="sec-inner">
      <nav class="breadcrumb">
        <a href="index.html">Home</a>
        <span class="breadcrumb-sep">›</span>
        <a href="cart.html">Cart</a>
        <span class="breadcrumb-sep">›</span>
        <span>Checkout</span>
      </nav>
      <h1 class="sec-h2">Secure <span>Checkout</span></h1>
    </div>
  </section>

  <section class="sec--sm">
    <div class="sec-inner">
      <div class="step-bar">
        <div class="step done"><div class="step-num">✓</div> Cart</div>
        <div class="step-sep"></div>
        <div class="step active"><div class="step-num">2</div> Details</div>
        <div class="step-sep"></div>
        <div class="step"><div class="step-num">3</div> Confirmation</div>
      </div>
      <div id="checkoutContent"></div>
    </div>
  </section>

  <div id="footer-mount"></div>
</div>
<script src="config.js"></script>
<script src="shared.js"></script>
<script>
  document.getElementById('header-mount').innerHTML = getNavHTML('');
  document.getElementById('footer-mount').innerHTML = getFooterHTML();
  const prods = (window.DETOXY_CONFIG || {}).products || [];
  const cfg = window.DETOXY_CONFIG || {};
  let _orderItems = [], _orderTotal = 0, _orderSubtotal = 0;

  function renderCheckout() {
    const items = Cart.get();
    const el = document.getElementById('checkoutContent');
    if (!items.length) {
      el.innerHTML = `<div class="empty-state"><div class="empty-icon">🛒</div><div class="empty-title">Your cart is empty</div><a href="products.html" class="btn btn-primary">Browse Products</a></div>`;
      return;
    }
    let subtotal = 0;
    const orderItems = items.map(item => {
      const p = prods.find(x=>x.id===item.id);
      if (!p) return null;
      subtotal += p.price * item.qty;
      return { ...p, qty: item.qty, lineTotal: p.price * item.qty };
    }).filter(Boolean);
    const freeAt = cfg.freeShippingAt || 999;
    const ship = subtotal >= freeAt ? 0 : (cfg.defaultShipping || 60);
    const total = subtotal + ship;
    _orderItems = orderItems; _orderTotal = total; _orderSubtotal = subtotal;

    const itemsHTML = orderItems.map(i => `
      <div class="order-item">
        <img class="order-thumb" src="${i.images&&i.images[0]||''}" alt="${i.name}"
          onerror="this.src='https://placehold.co/52x52/e8f5f2/2aab97?text=P'">
        <div style="flex:1">
          <div style="font-weight:600;font-size:.85rem;color:var(--dark)">${i.name}</div>
          <div style="font-size:.75rem;color:var(--muted)">₹${i.price.toLocaleString()} × ${i.qty}</div>
        </div>
        <div style="font-weight:700;color:var(--td);font-size:.9rem">₹${i.lineTotal.toLocaleString()}</div>
      </div>`).join('');

    el.innerHTML = `
    <div class="checkout-grid">
      <div>
        <div class="checkout-card">
          <h3>📦 Shipping Details</h3>
          <div id="orderAlert"></div>
          <div class="form-row">
            <div class="form-group"><label class="form-label">First Name <span class="req">*</span></label><input class="form-input" id="cFirst" placeholder="First name"/></div>
            <div class="form-group"><label class="form-label">Last Name <span class="req">*</span></label><input class="form-input" id="cLast" placeholder="Last name"/></div>
          </div>
          <div class="form-row">
            <div class="form-group"><label class="form-label">Phone <span class="req">*</span></label><input class="form-input" id="cPhone" type="tel" placeholder="+91 xxxxx xxxxx"/></div>
            <div class="form-group"><label class="form-label">Email</label><input class="form-input" id="cEmail" type="email" placeholder="your@email.com"/></div>
          </div>
          <div class="form-group"><label class="form-label">Address Line 1 <span class="req">*</span></label><input class="form-input" id="cAddr" placeholder="House/flat no., street, area"/></div>
          <div class="form-group"><label class="form-label">Address Line 2</label><input class="form-input" id="cAddr2" placeholder="Landmark (optional)"/></div>
          <div class="form-row">
            <div class="form-group"><label class="form-label">City <span class="req">*</span></label><input class="form-input" id="cCity" placeholder="City"/></div>
            <div class="form-group"><label class="form-label">State</label><input class="form-input" id="cState" placeholder="State"/></div>
          </div>
          <div class="form-row">
            <div class="form-group"><label class="form-label">PIN Code <span class="req">*</span></label><input class="form-input" id="cPin" placeholder="6-digit PIN" maxlength="6"/></div>
            <div class="form-group"><label class="form-label">Country</label><input class="form-input" id="cCountry" value="India"/></div>
          </div>
          <div class="form-group"><label class="form-label">Order Notes</label><textarea class="form-textarea" id="cNotes" placeholder="Any special instructions for your order?"></textarea></div>
        </div>
        <div class="checkout-card">
          <h3>💳 Payment Method</h3>
          <label class="pay-option selected" onclick="selectPay(this)"><input type="radio" name="pay" value="UPI" checked><div><div class="pay-label">📱 UPI / QR Payment</div><div class="pay-sub">PhonePe, GPay, Paytm — instant transfer</div></div></label>
          <label class="pay-option" onclick="selectPay(this)"><input type="radio" name="pay" value="Card"><div><div class="pay-label">💳 Debit / Credit Card</div><div class="pay-sub">All major cards accepted</div></div></label>
          <label class="pay-option" onclick="selectPay(this)"><input type="radio" name="pay" value="COD"><div><div class="pay-label">💵 Cash on Delivery</div><div class="pay-sub">Pay when your order arrives (₹20 extra fee)</div></div></label>
          <label class="pay-option" onclick="selectPay(this)"><input type="radio" name="pay" value="Bank Transfer"><div><div class="pay-label">🏦 Bank Transfer / NEFT</div><div class="pay-sub">For bulk orders — contact us for account details</div></div></label>
        </div>
      </div>
      <div>
        <div class="summary-card">
          <h3 style="font-family:'Cormorant Garamond',serif;font-size:1.15rem;font-weight:700;color:var(--dark);margin-bottom:16px;padding-bottom:12px;border-bottom:1px solid var(--border)">Order Summary</h3>
          ${itemsHTML}
          <div style="margin-top:14px;padding-top:14px;border-top:1px solid var(--border)">
            <div class="summary-row"><span>Subtotal (${orderItems.length} item${orderItems.length!==1?'s':''})</span><span>₹${subtotal.toLocaleString()}</span></div>
            <div class="summary-row"><span>Shipping</span><span>${ship===0?'<span style="color:var(--green);font-weight:600">FREE</span>':'₹'+ship}</span></div>
            <div class="summary-total"><span>Total</span><span style="color:var(--t)">₹${total.toLocaleString()}</span></div>
          </div>
          <button class="btn btn-primary btn-full btn-lg" style="margin-top:20px" id="placeOrderBtn" onclick="placeOrder()">
            🔒 Place Order →
          </button>
          <div style="margin-top:14px;display:flex;gap:8px;justify-content:center;flex-wrap:wrap">
            <span class="trust-pill" style="font-size:.68rem">🔒 Encrypted</span>
            <span class="trust-pill" style="font-size:.68rem">📦 Fast Dispatch</span>
            <span class="trust-pill" style="font-size:.68rem">↩️ 7-Day Return</span>
          </div>
          <p style="font-size:.73rem;color:var(--muted);text-align:center;margin-top:12px">By placing your order you agree to our <a href="about.html" style="color:var(--t)">Terms & Conditions</a></p>
        </div>
      </div>
    </div>`;
  }

  function selectPay(label) {
    document.querySelectorAll('.pay-option').forEach(l=>l.classList.remove('selected'));
    label.classList.add('selected');
  }

  async function placeOrder() {
    const get = id => document.getElementById(id)?.value?.trim()||'';
    const first=get('cFirst'), last=get('cLast'), phone=get('cPhone'), addr=get('cAddr'), city=get('cCity'), pin=get('cPin');
    const alertEl = document.getElementById('orderAlert');
    if (!first||!phone||!addr||!city||!pin) {
      alertEl.innerHTML = '<div class="alert alert--error" style="margin-bottom:16px">⚠️ Please fill all required fields.</div>';
      alertEl.scrollIntoView({behavior:'smooth',block:'center'});
      return;
    }
    if (!/^[6-9]\d{9}$/.test(phone.replace(/\s+/g,''))) {
      alertEl.innerHTML = '<div class="alert alert--error" style="margin-bottom:16px">⚠️ Please enter a valid 10-digit Indian mobile number.</div>';
      return;
    }
    if (!/^\d{6}$/.test(pin)) {
      alertEl.innerHTML = '<div class="alert alert--error" style="margin-bottom:16px">⚠️ Please enter a valid 6-digit PIN code.</div>';
      return;
    }
    const btn = document.getElementById('placeOrderBtn');
    btn.disabled = true; btn.textContent = '⏳ Placing order…';
    const payMethod = document.querySelector('input[name="pay"]:checked')?.value||'COD';
    const orderData = {
      id: OrderSync.generateId(),
      savedAt: new Date().toISOString(),
      name: [first,last].filter(Boolean).join(' '),
      phone, email: get('cEmail'),
      address: addr, address2: get('cAddr2'),
      city, state: get('cState'), pincode: pin, country: get('cCountry')||'India',
      items: _orderItems.map(i=>`${i.name} x${i.qty} (₹${i.lineTotal})`).join(' | '),
      subtotal: _orderSubtotal, total: _orderTotal,
      payment: payMethod, notes: get('cNotes'), status:'New'
    };
    try {
      await OrderSync.submit(orderData);
      Cart.clear();
      window.location.href = 'confirmation.html?id=' + encodeURIComponent(orderData.id);
    } catch(err) {
      alertEl.innerHTML = '<div class="alert alert--error" style="margin-bottom:16px">Something went wrong. Please try again.</div>';
      btn.disabled = false; btn.innerHTML = '🔒 Place Order →';
    }
  }
  renderCheckout();
</script>
</body>
</html>
