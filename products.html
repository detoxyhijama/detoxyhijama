<!DOCTYPE html>
<html lang="en">
<head>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,600;0,700;1,400&family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>All Products | Detoxy Hijama — Buy Hijama Cups & Cupping Equipment India</title>
  <meta name="description" content="Shop all hijama cups, cupping kits, and consumables. Premium quality at factory-direct prices. Free shipping on orders over ₹999."/>
  <meta name="robots" content="index, follow"/>
  <link rel="canonical" href="https://detoxyhijama.github.io/products.html"/>
  <link rel="stylesheet" href="assets/style.css"/>
  <style>
    .products-layout{display:grid;grid-template-columns:240px 1fr;gap:32px;align-items:start}
    .sidebar{background:#fff;border:1px solid var(--border);border-radius:var(--radius-lg);padding:24px;position:sticky;top:88px}
    .sidebar-title{font-family:'Cormorant Garamond',serif;font-size:1.1rem;font-weight:700;color:var(--dark);margin-bottom:16px;padding-bottom:10px;border-bottom:1px solid var(--border)}
    .sidebar-section{margin-bottom:24px}
    .sidebar-label{font-size:.75rem;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.06em;margin-bottom:10px}
    .sidebar-radio{display:flex;align-items:center;gap:8px;padding:8px 10px;border-radius:var(--radius-sm);cursor:pointer;transition:background .15s;font-size:.87rem}
    .sidebar-radio:hover{background:var(--cream)}
    .sidebar-radio.active{background:var(--tp);color:var(--td);font-weight:600}
    .sidebar-radio input{accent-color:var(--t)}
    .products-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:24px;flex-wrap:wrap;gap:12px}
    .products-count{font-size:.87rem;color:var(--muted)}
    .sort-select{padding:8px 12px;border:1.5px solid var(--border);border-radius:var(--radius-sm);font-size:.84rem;color:var(--text);background:var(--white);cursor:pointer;font-family:inherit}
    .sort-select:focus{outline:none;border-color:var(--t)}
    .no-results{text-align:center;padding:60px 20px;color:var(--muted)}
    @media(max-width:900px){.products-layout{grid-template-columns:1fr}.sidebar{display:none}}
  </style>
</head>
<body>
<div class="page-wrapper">
  <div id="header-mount"></div>

  <!-- PAGE HEADER -->
  <section style="background:linear-gradient(135deg,var(--dark),var(--mid));padding:48px 0;color:#fff">
    <div class="sec-inner">
      <nav class="breadcrumb" style="color:rgba(255,255,255,.6)">
        <a href="index.html" style="color:rgba(255,255,255,.6)">Home</a>
        <span class="breadcrumb-sep">›</span>
        <span style="color:var(--tl)">All Products</span>
      </nav>
      <h1 style="font-family:'Cormorant Garamond',serif;font-size:clamp(2rem,4vw,2.8rem);font-weight:700;color:#fff;margin-bottom:10px">Hijama Equipment Store</h1>
      <p style="color:rgba(255,255,255,.65);font-size:.95rem">Clinic-grade quality at factory-direct prices. Free shipping on orders over ₹999.</p>
    </div>
  </section>

  <!-- MOBILE FILTERS -->
  <div class="sec-inner" style="padding-top:20px;padding-bottom:0">
    <div class="filter-chips" id="mobileFilter" style="display:none">
      <button class="filter-chip active" data-cat="all">All</button>
      <button class="filter-chip" data-cat="cups">Cups</button>
      <button class="filter-chip" data-cat="kits">Kits</button>
      <button class="filter-chip" data-cat="consumables">Consumables</button>
    </div>
  </div>

  <section class="sec--sm">
    <div class="sec-inner">
      <div class="products-layout">
        <!-- Sidebar -->
        <aside class="sidebar">
          <div class="sidebar-title">🔧 Filter Products</div>
          <div class="sidebar-section">
            <div class="sidebar-label">Category</div>
            <label class="sidebar-radio active" data-cat="all">
              <input type="radio" name="cat" value="all" checked> All Products
            </label>
            <label class="sidebar-radio" data-cat="cups">
              <input type="radio" name="cat" value="cups"> 🫙 Hijama Cups
            </label>
            <label class="sidebar-radio" data-cat="kits">
              <input type="radio" name="cat" value="kits"> 🧰 Cupping Kits
            </label>
            <label class="sidebar-radio" data-cat="consumables">
              <input type="radio" name="cat" value="consumables"> 🩺 Consumables
            </label>
          </div>
          <div class="sidebar-section">
            <div class="sidebar-label">Price Range</div>
            <label class="sidebar-radio" data-price="all"><input type="radio" name="price" value="all" checked> All Prices</label>
            <label class="sidebar-radio" data-price="0-199"><input type="radio" name="price" value="0-199"> Under ₹200</label>
            <label class="sidebar-radio" data-price="200-499"><input type="radio" name="price" value="200-499"> ₹200 – ₹499</label>
            <label class="sidebar-radio" data-price="500-999"><input type="radio" name="price" value="500-999"> ₹500 – ₹999</label>
            <label class="sidebar-radio" data-price="1000-99999"><input type="radio" name="price" value="1000-99999"> ₹1000+</label>
          </div>
          <button class="btn btn-outline btn-full btn-sm" id="clearFilters" style="margin-top:8px">Clear Filters</button>
        </aside>

        <!-- Products grid -->
        <div>
          <div class="products-header">
            <div class="products-count" id="productsCount">Showing all products</div>
            <select class="sort-select" id="sortSelect">
              <option value="default">Sort: Default</option>
              <option value="price-asc">Price: Low to High</option>
              <option value="price-desc">Price: High to Low</option>
              <option value="rating">Best Rated</option>
              <option value="discount">Biggest Discount</option>
            </select>
          </div>
          <div class="product-grid" id="productsGrid"></div>
        </div>
      </div>
    </div>
  </section>

  <div id="footer-mount"></div>
</div>

<script src="config.js"></script>
<script src="shared.js"></script>
<script>
  document.getElementById('header-mount').innerHTML = getNavHTML('Products');
  document.getElementById('footer-mount').innerHTML = getFooterHTML();

  // Show mobile filter chips
  if (window.innerWidth <= 900) {
    document.getElementById('mobileFilter').style.display = 'flex';
  }

  const allProds = (window.DETOXY_CONFIG || {}).products || [];
  let activeCat = 'all';
  let activePrice = 'all';
  let activeSort = 'default';

  // Read URL params
  const urlParams = new URLSearchParams(window.location.search);
  if (urlParams.get('cat')) {
    activeCat = urlParams.get('cat');
    document.querySelectorAll('.sidebar-radio[data-cat]').forEach(el => {
      el.classList.toggle('active', el.dataset.cat === activeCat);
    });
    document.querySelectorAll('#mobileFilter .filter-chip').forEach(el => {
      el.classList.toggle('active', el.dataset.cat === activeCat);
    });
  }

  function buildCard(p) {
    const imgSrc = p.images && p.images[0] ? p.images[0] : '';
    const discount = p.mrp ? Math.round((1 - p.price/p.mrp)*100) : 0;
    const badgeMap = { Bestseller:'badge-bestseller', New:'badge-new', Popular:'badge-popular', Trending:'badge-trending' };
    const badgeClass = p.badge ? (badgeMap[p.badge]||'badge-sale') : '';
    const stars = '★'.repeat(Math.floor(p.rating||4.5)) + ((p.rating||4.5)%1>=0.5?'½':'');
    return `<div class="product-card reveal">
      <div class="product-card-img-wrap">
        <img class="product-card-img" src="${imgSrc}" alt="${p.name}"
          onerror="this.src='https://placehold.co/320x320/e8f5f2/2aab97?text=${encodeURIComponent(p.name)}'">
        ${p.badge ? `<span class="product-card-badge ${badgeClass}">${p.badge}</span>` : ''}
        ${discount>0 ? `<span class="product-card-badge badge-sale" style="top:${p.badge?'40px':'12px'}">${discount}% off</span>` : ''}
        <button class="product-card-quick" onclick="Cart.add('${p.id}',1);event.stopPropagation()">🛒 Quick Add to Cart</button>
      </div>
      <div class="product-card-body">
        <div class="product-card-cat">${p.cat}</div>
        <div class="product-card-name">${p.name}</div>
        <div class="product-card-desc">${p.desc||''}</div>
        <div class="product-card-rating">
          <span class="stars" style="color:#f59e0b">${stars}</span>
          <span class="rating-val">${p.rating||4.5}</span>
          <span class="rating-count">(${Math.floor((p.rating||4.5)*17)} reviews)</span>
        </div>
        <div class="product-card-price">
          <span class="price-now">₹${p.price.toLocaleString()}</span>
          <span class="price-unit">${p.unit||''}</span>
          ${p.mrp ? `<span class="price-mrp">₹${p.mrp}</span>` : ''}
          ${discount>0 ? `<span class="price-save-pct">${discount}% off</span>` : ''}
        </div>
      </div>
      <div class="product-card-actions">
        <a href="products/${p.id}.html" class="btn btn-outline" style="flex:1">View Details</a>
        <button class="btn btn-primary" onclick="Cart.add('${p.id}',1)">🛒 Add</button>
      </div>
    </div>`;
  }

  function applyFilters() {
    let filtered = [...allProds];
    // Category
    if (activeCat !== 'all') filtered = filtered.filter(p => p.cat === activeCat);
    // Price
    if (activePrice !== 'all') {
      const [min, max] = activePrice.split('-').map(Number);
      filtered = filtered.filter(p => p.price >= min && p.price <= max);
    }
    // Sort
    if (activeSort === 'price-asc') filtered.sort((a,b) => a.price - b.price);
    else if (activeSort === 'price-desc') filtered.sort((a,b) => b.price - a.price);
    else if (activeSort === 'rating') filtered.sort((a,b) => (b.rating||0) - (a.rating||0));
    else if (activeSort === 'discount') filtered.sort((a,b) => {
      const da = a.mrp ? (1 - a.price/a.mrp) : 0;
      const db = b.mrp ? (1 - b.price/b.mrp) : 0;
      return db - da;
    });

    const grid = document.getElementById('productsGrid');
    document.getElementById('productsCount').textContent = `Showing ${filtered.length} product${filtered.length!==1?'s':''}`;
    if (!filtered.length) {
      grid.innerHTML = '<div class="no-results" style="grid-column:1/-1"><div class="empty-icon">🔍</div><p>No products found. Try different filters.</p><button class="btn btn-primary" onclick="clearAll()">Clear Filters</button></div>';
      return;
    }
    grid.innerHTML = filtered.map(buildCard).join('');
    // Re-run observers
    document.querySelectorAll('.reveal:not(.visible)').forEach(el => {
      if (!el._observed) { el._observed = true; revealObs.observe(el); }
    });
  }

  // Reveal observer
  const revealObs = new IntersectionObserver(entries => {
    entries.forEach(e => { if(e.isIntersecting) e.target.classList.add('visible'); });
  }, { threshold: 0.08 });

  // Sidebar category
  document.querySelectorAll('.sidebar-radio[data-cat]').forEach(el => {
    el.addEventListener('click', () => {
      activeCat = el.dataset.cat;
      document.querySelectorAll('.sidebar-radio[data-cat]').forEach(r => r.classList.remove('active'));
      el.classList.add('active');
      applyFilters();
    });
  });
  // Sidebar price
  document.querySelectorAll('.sidebar-radio[data-price]').forEach(el => {
    el.addEventListener('click', () => {
      activePrice = el.dataset.price;
      document.querySelectorAll('.sidebar-radio[data-price]').forEach(r => r.classList.remove('active'));
      el.classList.add('active');
      applyFilters();
    });
  });
  // Mobile filter
  document.querySelectorAll('#mobileFilter .filter-chip').forEach(btn => {
    btn.addEventListener('click', () => {
      document.querySelectorAll('#mobileFilter .filter-chip').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      activeCat = btn.dataset.cat;
      applyFilters();
    });
  });
  // Sort
  document.getElementById('sortSelect').addEventListener('change', function() {
    activeSort = this.value;
    applyFilters();
  });
  // Clear
  document.getElementById('clearFilters').addEventListener('click', clearAll);
  function clearAll() {
    activeCat = 'all'; activePrice = 'all'; activeSort = 'default';
    document.querySelectorAll('.sidebar-radio').forEach(r => r.classList.remove('active'));
    document.querySelector('.sidebar-radio[data-cat="all"]').classList.add('active');
    document.querySelector('.sidebar-radio[data-price="all"]').classList.add('active');
    document.getElementById('sortSelect').value = 'default';
    applyFilters();
  }

  applyFilters();
</script>
</body>
</html>
